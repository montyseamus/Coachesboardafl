<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coach Board">
<title>VAFA Coach Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none}
#app{height:100vh;width:100vw;overflow:hidden;display:flex;flex-direction:column}
@supports(height:100dvh){#app{height:100dvh}}
body{background:#0c0a09;color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,'Helvetica Neue',sans-serif}
button{cursor:pointer;font-family:inherit;-webkit-appearance:none}
input,textarea,select{font-family:inherit;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none}
select{background-image:none}
svg{touch-action:none;user-select:none;-webkit-user-select:none}

/* Field tab responsive layout */
.field-layout{flex-direction:column}
.field-roster{width:100%;max-height:38vh;border-top:1px solid #292524}
@media(min-width:720px){
  .field-layout{flex-direction:row !important}
  .field-roster{width:300px !important;max-height:none !important;border-top:none !important;border-left:1px solid #292524}
}

/* Lineup tab generic side-by-side */
@media(min-width:900px){
  .lg-row{flex-direction:row !important}
  .lg-sidebar{width:320px !important;max-height:none !important;border-top:none !important;border-left:1px solid #292524 !important}
}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#a8a29e;font-size:14px">Loading…</div>
</div>

function lsSave(key, value) {

// ============ WHITEBOARD ============
function Whiteboard() {
  const [half, setHalf] = useState(false);
  const [tool, setTool] = useState("pen");
  const [color, setColor] = useState("#1E3A8A");
  const [size, setSize] = useState(0.7);
  const [strokes, setStrokes] = useState([]);
  const [drawing, setDrawing] = useState(false);
  const [showColors, setShowColors] = useState(false);
  const svgRef = useRef(null);
  const curRef = useRef(null);

  const getPoint = (e) => {
    const svg = svgRef.current; if (!svg) return null;
    const pt = svg.createSVGPoint();
    const t = e.touches ? e.touches[0] : e;
    pt.x = t.clientX; pt.y = t.clientY;
    const ctm = svg.getScreenCTM(); if (!ctm) return null;
    return pt.matrixTransform(ctm.inverse());
  };
  const startDraw = (e) => {
    e.preventDefault();
    const p = getPoint(e); if (!p) return;
    const s = {color: tool==="eraser"?"ERASE":color, size: tool==="eraser"?size*3:size, points:[{x:p.x,y:p.y}]};
    curRef.current = s;
    setStrokes(prev => [...prev, s]);
    setDrawing(true);
  };
  const moveDraw = (e) => {
    if (!drawing) return; e.preventDefault();
    const p = getPoint(e); if (!p) return;
    const cur = curRef.current; if (!cur) return;
    cur.points.push({x:p.x,y:p.y});
    setStrokes(prev => [...prev.slice(0,-1), {...cur, points:[...cur.points]}]);
  };
  const endDraw = () => { setDrawing(false); curRef.current = null; };
  const pathFrom = (pts) => {
    if (!pts || !pts.length) return "";
    if (pts.length === 1) return `M ${pts[0].x} ${pts[0].y} l 0.01 0.01`;
    return pts.reduce((d,p,i) => d + (i===0 ? `M ${p.x} ${p.y}` : ` L ${p.x} ${p.y}`), "");
  };

  return html`
    <div style="display:flex;flex-direction:column;height:100%">
      <div style="display:flex;align-items:center;gap:8px;padding:12px;background:#1c1917;border-bottom:1px solid #292524;flex-wrap:wrap">
        <div style="display:flex;background:#292524;border-radius:8px;padding:4px">
          <button onClick=${()=>setHalf(false)} style=${{padding:"6px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:"700",background:!half?"#2563eb":"transparent",color:!half?"#fff":"#d6d3d1",border:"none",cursor:"pointer"}}>FULL FIELD</button>
          <button onClick=${()=>setHalf(true)} style=${{padding:"6px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:"700",background:half?"#2563eb":"transparent",color:half?"#fff":"#d6d3d1",border:"none",cursor:"pointer"}}>HALF FIELD</button>
        </div>
        <div style="width:1px;height:32px;background:#44403c"/>
        <button onClick=${()=>setTool("pen")} style=${{padding:"8px",borderRadius:"8px",background:tool==="pen"?"#2563eb":"#292524",color:tool==="pen"?"#fff":"#d6d3d1",border:"none",cursor:"pointer",display:"flex"}}><${Icon} name="pencil" size=${18}/></button>
        <button onClick=${()=>setTool("eraser")} style=${{padding:"8px",borderRadius:"8px",background:tool==="eraser"?"#2563eb":"#292524",color:tool==="eraser"?"#fff":"#d6d3d1",border:"none",cursor:"pointer",display:"flex"}}><${Icon} name="eraser" size=${18}/></button>
        <div style="position:relative">
          <button onClick=${()=>setShowColors(s=>!s)} style="padding:8px;border-radius:8px;background:#292524;border:none;cursor:pointer;display:flex;align-items:center;gap:6px">
            <span style=${{width:"20px",height:"20px",borderRadius:"50%",background:color,border:"2px solid #57534e",display:"inline-block"}}/>
            <${Icon} name="palette" size=${14} color="#a8a29e"/>
          </button>
          ${showColors && html`
            <div style="position:absolute;top:100%;left:0;margin-top:4px;background:#292524;border-radius:8px;padding:8px;display:flex;gap:6px;z-index:20;box-shadow:0 20px 25px rgba(0,0,0,.5);border:1px solid #44403c">
              ${DRAW_COLORS.map(c => html`
                <button key=${c} onClick=${()=>{setColor(c);setShowColors(false);setTool("pen");}}
                  style=${{width:"28px",height:"28px",borderRadius:"50%",background:c,border:"2px solid #57534e",cursor:"pointer"}}/>
              `)}
            </div>`}
        </div>
        <div style="display:flex;align-items:center;gap:8px;background:#292524;border-radius:8px;padding:6px 12px">
          <span style="font-size:11px;color:#a8a29e;font-weight:700">SIZE</span>
          <input type="range" min="0.2" max="2.5" step="0.1" value=${size}
            onChange=${e=>setSize(parseFloat(e.target.value))} style="width:80px;accent-color:#3b82f6"/>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button onClick=${()=>setStrokes(s=>s.slice(0,-1))} style="padding:8px;border-radius:8px;background:#292524;color:#d6d3d1;border:none;cursor:pointer;display:flex"><${Icon} name="undo" size=${18}/></button>
          <button onClick=${()=>setStrokes([])} style="padding:8px;border-radius:8px;background:#dc2626;color:#fff;border:none;cursor:pointer;display:flex"><${Icon} name="trash" size=${18}/></button>
        </div>
      </div>
      <div style="flex:1;background:#0c0a09;padding:8px;overflow:hidden;display:flex;align-items:center;justify-content:center">
        <div style="width:100%;height:100%;max-width:768px">
          <${AFLField} half=${half} svgRef=${svgRef}>
            <g onmousedown=${startDraw} onmousemove=${moveDraw} onmouseup=${endDraw} onmouseleave=${endDraw}
               ontouchstart=${startDraw} ontouchmove=${moveDraw} ontouchend=${endDraw}>
              <rect x="-10" y="-10" width=${FIELD_W+20} height=${(half?FIELD_H/2:FIELD_H)+20} fill="rgba(0,0,0,0.001)"/>
              ${strokes.map((s,i) => html`
                <path key=${i} d=${pathFrom(s.points)}
                  stroke=${s.color==="ERASE"?"url(#fieldGrad)":s.color}
                  stroke-width=${s.size} stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              `)}
            </g>
          </${AFLField}>
        </div>
      </div>
    </div>`;
}

// ============ LINEUP ============
function Lineup({roster, setRoster, lineup, setLineup, games, setGames, currentGameId}) {
  const [subView, setSubView] = useState("field");
  const [editing, setEditing] = useState(false);
  const [newName, setNewName] = useState("");
  const [newNumber, setNewNumber] = useState("");
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [swapSlot1, setSwapSlot1] = useState(null);
  const [draggedPlayer, setDraggedPlayer] = useState(null);
  const [dragOverSlot, setDragOverSlot] = useState(null);

  const cg = games.find(g=>g.id===currentGameId);
  const icLog = cg ? (cg.interchangeLog||[]) : [];

  const playerInSlot = id => roster.find(p=>p.id===lineup[id]);
  const isAssigned = pid => Object.values(lineup).includes(pid);

  const assign = (key, pid) => {
    const next = {...lineup};
    Object.keys(next).forEach(k=>{ if(next[k]===pid) delete next[k]; });
    next[key] = pid;
    setLineup(next); setSelectedSlot(null);
  };
  const clearSlot = k => { const n={...lineup}; delete n[k]; setLineup(n); setSelectedSlot(null); };

  const addPlayer = () => {
    if (!newName.trim()) return;
    const p = {id:`p_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,name:newName.trim(),number:newNumber.trim(),status:STATUS.ACTIVE};
    setRoster(prev=>[...prev,p]);
    setNewName(""); setNewNumber("");
  };
  const removePlayer = id => {
    setRoster(prev=>prev.filter(p=>p.id!==id));
    const n={...lineup}; Object.keys(n).forEach(k=>{if(n[k]===id)delete n[k];}); setLineup(n);
  };
  const setStatus = (id, status) => {
    setRoster(prev=>prev.map(p=>p.id===id?{...p,status}:p));
    if (status!==STATUS.ACTIVE) {
      const n={...lineup}; Object.keys(n).forEach(k=>{if(n[k]===id)delete n[k];}); setLineup(n);
    }
  };

  const handleSwap = (slotId) => {
    if (!swapSlot1) { setSwapSlot1(slotId); return; }
    if (swapSlot1===slotId) { setSwapSlot1(null); return; }
    const p1=lineup[swapSlot1], p2=lineup[slotId];
    const pl1=roster.find(p=>p.id===p1), pl2=roster.find(p=>p.id===p2);
    const next={...lineup};
    if(p1) next[slotId]=p1; else delete next[slotId];
    if(p2) next[swapSlot1]=p2; else delete next[swapSlot1];
    setLineup(next);
    if (cg) {
      const entry={
        id:`ic_${Date.now()}`,
        time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),
        slot1:swapSlot1, slot2:slotId,
        player1Name:pl1?pl1.name:"Empty",
        player2Name:pl2?pl2.name:"Empty"
      };
      setGames(prev=>prev.map(g=>g.id===currentGameId?{...g,interchangeLog:[...(g.interchangeLog||[]),entry]}:g));
    }
    setSwapSlot1(null);
  };

  const slotLabel = id => (FIELD_POSITIONS.find(p=>p.id===id)||{label:id}).label;
  const stBg = s => s===STATUS.INJURED?"#b91c1c":s===STATUS.UNAVAILABLE?"#44403c":"#1d4ed8";

  // Drag-and-drop helpers (HTML5 native works on iPad with long-press)
  const handleDragStart = (player) => (e) => {
    setDraggedPlayer(player);
    if (e.dataTransfer) {
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", player.id);
    }
  };
  const handleDragEnd = () => { setDraggedPlayer(null); setDragOverSlot(null); };
  const handleDragOver = (slotId) => (e) => {
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = "move";
    if (dragOverSlot !== slotId) setDragOverSlot(slotId);
  };
  const handleDrop = (slotId) => (e) => {
    e.preventDefault();
    if (draggedPlayer) assign(slotId, draggedPlayer.id);
    setDraggedPlayer(null); setDragOverSlot(null);
  };

  // ---- FIELD TAB ----
  // Layout: field on left (or top on portrait), roster always visible on right (or bottom).
  // Player tap-and-place: tap a roster player to "pick" it, then tap a slot to place.
  const [pickedPlayer, setPickedPlayer] = useState(null);
  const tapToPlace = (slotId) => {
    if (pickedPlayer) {
      assign(slotId, pickedPlayer.id);
      setPickedPlayer(null);
      setSelectedSlot(null);
      return;
    }
    // No player picked -> select the slot to allow tap-from-roster placement
    setSelectedSlot({type: FIELD_POSITIONS.find(p=>p.id===slotId) ? "field" : "bench", id: slotId});
  };

  const FieldTab = () => html`
    <div style="display:flex;flex:1;overflow:hidden;flex-direction:column" class="field-layout">
      <!-- LEFT/TOP: Field + bench -->
      <div style="flex:1;background:#0c0a09;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;min-height:0">
        <div style="padding:8px 12px;display:flex;flex-direction:column;align-items:center">
          <div style="font-size:10px;font-weight:900;letter-spacing:.3em;color:#60a5fa;margin-bottom:4px">⬆ DEFENDING END</div>
          <div style="width:100%;max-width:560px;aspect-ratio:100/130">
            <${AFLField}>
              ${FIELD_POSITIONS.map(pos => {
                const player=playerInSlot(pos.id);
                const sel=selectedSlot&&selectedSlot.id===pos.id;
                const isOver=dragOverSlot===pos.id;
                const w=14, h=7;
                return html`
                  <g key=${pos.id} transform=${`translate(${pos.x-w/2},${pos.y-h/2})`} style="cursor:pointer"
                    onClick=${()=>tapToPlace(pos.id)}
                    ondragover=${handleDragOver(pos.id)}
                    ondrop=${handleDrop(pos.id)}>
                    <rect width=${w} height=${h} rx="1.4"
                      fill=${isOver?"#FFD400":player?"#1E3A8A":"rgba(0,0,0,0.7)"}
                      stroke=${sel?"#DC2626":isOver?"#FFD400":"#fff"} stroke-width=${sel||isOver?"0.7":"0.4"}/>
                    ${player ? html`
                      <text x=${w/2} y="3" text-anchor="middle" font-size="2.3" font-weight="900" fill="#fff">${player.number?`#${player.number}`:pos.label}</text>
                      <text x=${w/2} y="5.6" text-anchor="middle" font-size="1.7" font-weight="700" fill="#FFD400">${player.name.length>11?player.name.slice(0,10)+"…":player.name}</text>
                    ` : html`<text x=${w/2} y="4.4" text-anchor="middle" font-size="2.3" font-weight="900" fill="#fff">${pos.label}</text>`}
                  </g>`;
              })}
            </${AFLField}>
          </div>
          <div style="font-size:10px;font-weight:900;letter-spacing:.3em;color:#ef4444;margin-top:4px">⬇ ATTACKING END</div>
        </div>
        <!-- BENCH -->
        <div style="padding:0 12px 12px">
          <div style="background:#1c1917;border-radius:12px;padding:10px;border:1px solid #292524">
            <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:8px">BENCH</div>
            <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px">
              ${BENCH_SLOTS.map(b=>{
                const player=playerInSlot(b);
                const sel=selectedSlot&&selectedSlot.id===b;
                const isOver=dragOverSlot===b;
                return html`
                  <button key=${b}
                    onClick=${()=>tapToPlace(b)}
                    ondragover=${handleDragOver(b)}
                    ondrop=${handleDrop(b)}
                    style=${{aspectRatio:"1/1",borderRadius:"8px",padding:"4px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",background:isOver?"#FFD400":player?"#1d4ed8":"#292524",color:isOver?"#000":player?"#fff":"#a8a29e",border:sel?"2px solid #ef4444":isOver?"2px solid #FFD400":"2px solid transparent",cursor:"pointer"}}>
                    <div style="font-size:9px;opacity:.7">${b}</div>
                    ${player ? html`

// ============ STATS ============
function calcScore(game) {
  if (!game) return {goals:0,behinds:0,points:0};
  let goals=0, behinds=0;
  QUARTERS.forEach(q=>{
    goals += (game.stats.team[q]&&game.stats.team[q]["Goals"])||0;
    behinds += (game.stats.team[q]&&game.stats.team[q]["Behinds"])||0;
  });
  return {goals, behinds, points:goals*6+behinds};
}
function calcQScore(game,q) {
  if (!game) return {goals:0,behinds:0,points:0};
  const g=(game.stats.team[q]&&game.stats.team[q]["Goals"])||0;
  const b=(game.stats.team[q]&&game.stats.team[q]["Behinds"])||0;
  return {goals:g,behinds:b,points:g*6+b};
}

function Stats({roster, games, setGames, customStats, setCustomStats, currentGameId, setCurrentGameId, teamName, setTeamName}) {
  const [view, setView] = useState("track");
  const [quarter, setQuarter] = useState(0);
  const [scope, setScope] = useState("team");
  const [selPlayer, setSelPlayer] = useState(null);
  const [showNewStat, setShowNewStat] = useState(false);
  const [newStatName, setNewStatName] = useState("");
  const [showNewGame, setShowNewGame] = useState(false);
  const [newOpp, setNewOpp] = useState("");
  const [editOpp, setEditOpp] = useState(false);
  const [goalPending, setGoalPending] = useState(false);
  const [editNoteQ, setEditNoteQ] = useState(null);
  const [noteText, setNoteText] = useState("");

  const cg = games.find(g=>g.id===currentGameId);
  const allStats = [...DEFAULT_STATS, ...customStats];

  const startGame = () => {
    if (!newOpp.trim()) return;
    const game = {
      id:`g_${Date.now()}`, opponent:newOpp.trim(), date:new Date().toISOString(),
      opponentScore:{goals:0,behinds:0},
      stats:{team:{Q1:{},Q2:{},Q3:{},Q4:{}},players:{}},
      quarterNotes:{Q1:"",Q2:"",Q3:"",Q4:""},
      interchangeLog:[]
    };
    setGames(prev=>[...prev,game]);
    setCurrentGameId(game.id);
    setNewOpp(""); setShowNewGame(false); setView("track");
  };

  const applyUpdate = (stat, delta, pid) => {
    if (!cg) return;
    const q = QUARTERS[quarter];
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      ng.stats.team[q][stat] = Math.max(0,(ng.stats.team[q][stat]||0)+delta);
      if (!ng.stats.players[pid]) ng.stats.players[pid]={Q1:{},Q2:{},Q3:{},Q4:{}};
      ng.stats.players[pid][q][stat] = Math.max(0,(ng.stats.players[pid][q][stat]||0)+delta);
      return ng;
    }));
  };

  const updateStat = (stat, delta) => {
    if (!cg) return;
    if (scope==="player") { if(!selPlayer)return; applyUpdate(stat,delta,selPlayer); return; }
    if (stat==="Goals" && delta>0 && roster.length>0) { setGoalPending(true); return; }
    applyUpdate(stat,delta,UNK);
  };

  const confirmKicker = (pid) => { applyUpdate("Goals",1,pid); setGoalPending(false); };

  const updateOpp = (k, delta) => {
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const os = {...(g.opponentScore||{goals:0,behinds:0})};
      os[k] = Math.max(0,(os[k]||0)+delta);
      return {...g, opponentScore:os};
    }));
  };

  const saveNote = () => {
    if (!cg||!editNoteQ) return;
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const qn = {...(g.quarterNotes||{})};
      qn[editNoteQ] = noteText;
      return {...g, quarterNotes:qn};
    }));
    setEditNoteQ(null); setNoteText("");
  };

  const addCustomStat = () => {
    const n=newStatName.trim();
    if (!n||allStats.includes(n)) return;
    setCustomStats(prev=>[...prev,n]);
    setNewStatName(""); setShowNewStat(false);
  };

  const getVal = (stat) => {
    if (!cg) return 0;
    const q=QUARTERS[quarter];
    if (scope==="team") return (cg.stats.team[q]&&cg.stats.team[q][stat])||0;
    if (selPlayer&&cg.stats.players[selPlayer]) return (cg.stats.players[selPlayer][q]&&cg.stats.players[selPlayer][q][stat])||0;
    return 0;
  };

  const getTotal = (stat,gid,type,pid) => {
    const g=games.find(x=>x.id===gid); if(!g)return 0;
    let t=0;
    QUARTERS.forEach(q=>{
      if(type==="team") t+=(g.stats.team[q]&&g.stats.team[q][stat])||0;
      else if(pid&&g.stats.players[pid]) t+=(g.stats.players[pid][q]&&g.stats.players[pid][q][stat])||0;
    });
    return t;
  };

  const deleteGame = (id) => {
    if (!confirm("Delete this game and all its stats?")) return;
    setGames(prev=>prev.filter(g=>g.id!==id));
    if (currentGameId===id) setCurrentGameId(null);
  };

  const pName = (pid) => {
    if(pid===UNK)return "Unattributed";
    const p=roster.find(x=>x.id===pid);
    return p?(p.number?`#${p.number} `:"")+(p.name):"Unknown";
  };

  const exportCSV = () => {
    if (!games.length) return;
    const rows=[["Game","Date","Opponent","Quarter","Scope","Player",...allStats]];
    games.forEach(g=>{
      const d=new Date(g.date).toLocaleDateString();
      QUARTERS.forEach(q=>{
        const tr=[`${teamName} vs ${g.opponent}`,d,g.opponent,q,"Team","—"];
        allStats.forEach(s=>tr.push((g.stats.team[q]&&g.stats.team[q][s])||0));
        rows.push(tr);
        Object.keys(g.stats.players).forEach(pid=>{
          const pr=[`${teamName} vs ${g.opponent}`,d,g.opponent,q,"Player",pName(pid)];
          allStats.forEach(s=>pr.push((g.stats.players[pid][q]&&g.stats.players[pid][q][s])||0));
          rows.push(pr);
        });
      });
      QUARTERS.forEach(q=>{const note=(g.quarterNotes||{})[q];if(note)rows.push([`${teamName} vs ${g.opponent}`,d,g.opponent,q,"Note",note]);});
      (g.interchangeLog||[]).forEach(ic=>rows.push([`${teamName} vs ${g.opponent}`,d,g.opponent,ic.time,"Interchange",`${ic.player1Name}(${ic.slot1})⇄${ic.player2Name}(${ic.slot2})`]));
      const ts=calcScore(g), os=g.opponentScore||{goals:0,behinds:0};

    });
    const csv=rows.map(r=>r.map(c=>{const s=String(c??"");return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:`${s}`;}).join(",")).join("\n");

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <h3 style="color:#fff;font-weight:900;font-size:18px;margin:0">⚽ GOAL — Who kicked it?</h3>
            <button onClick=${()=>{applyUpdate("Goals",1,UNK);setGoalPending(false);}} style="background:none;border:none;cursor:pointer;color:#78716c;display:flex"><${Icon} name="x" size=${22}/></button>
          </div>
          <div style="font-size:12px;color:#a8a29e;margin-bottom:16px">Tap a player. Tap ✕ to skip.</div>
          <div style="display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch">
            ${active.map(p=>html`
              <button key=${p.id} onClick=${()=>confirmKicker(p.id)}
                style="display:flex;align-items:center;gap:12px;padding:12px;background:#292524;border-radius:12px;border:none;cursor:pointer;text-align:left;font-family:inherit">
                <div style="width:40px;height:40px;border-radius:8px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0">
                  ${p.number||p.name.slice(0,1).toUpperCase()}
                </div>
                <div>
                  <div style="color:#fff;font-weight:700;font-size:14px">${p.name}</div>
                  ${p.number?html`<div style="color:#a8a29e;font-size:12px">#${p.number}</div>`:null}
                </div>
              </button>`)}
            <button onClick=${()=>{applyUpdate("Goals",1,UNK);setGoalPending(false);}}
              style="padding:12px;background:#292524;border-radius:12px;border:none;cursor:pointer;color:#a8a29e;font-size:13px;font-weight:700;text-align:left;font-family:inherit">
              Unknown / Don't attribute
            </button>
          </div>
        </div>
      </div>`;
  };

  // ---- MODAL: Quarter note ----
  const NoteModal = () => {
    if (!editNoteQ) return null;
    return html`
      <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.8)" onClick=${saveNote}>
        <div style="background:#1c1917;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px;border:1px solid #1d4ed8" onClick=${e=>e.stopPropagation()}>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <h3 style="color:#fff;font-weight:900;font-size:18px;margin:0">📝 ${editNoteQ} Notes</h3>
            <button onClick=${()=>setEditNoteQ(null)} style="background:none;border:none;cursor:pointer;color:#78716c;display:flex"><${Icon} name="x" size=${20}/></button>
          </div>
          <textarea value=${noteText} onInput=${e=>setNoteText(e.target.value)} autofocus
            placeholder="e.g. Push wide on wings, watch their #7, hold the ball carrier…"
            style="width:100%;height:140px;background:#292524;color:#fff;padding:10px;border-radius:10px;border:1px solid #44403c;font-size:13px;resize:none;font-family:inherit;box-sizing:border-box"/>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button onClick=${()=>setEditNoteQ(null)} style="flex:1;background:#292524;color:#d6d3d1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Cancel</button>
            <button onClick=${saveNote} style="flex:1;background:#2563eb;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Save Note</button>
          </div>
        </div>
      </div>`;
  };

  // ---- MODAL: New game ----
  const NewGameModal = () => {
    if (!showNewGame) return null;
    return html`
      <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.7)" onClick=${()=>setShowNewGame(false)}>
        <div style="background:#1c1917;border-radius:12px;padding:20px;width:100%;max-width:384px;border:1px solid #44403c" onClick=${e=>e.stopPropagation()}>
          <h3 style="color:#fff;font-weight:700;margin:0 0 16px">New Game</h3>
          <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Your team</label>
          <input type="text" value=${teamName} onInput=${e=>setTeamName(e.target.value)}
            style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin:4px 0 12px;box-sizing:border-box;font-family:inherit"/>
          <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Opponent</label>
          <input type="text" value=${newOpp} onInput=${e=>setNewOpp(e.target.value)}
            onKeyDown=${e=>e.key==="Enter"&&startGame()} placeholder="e.g. Prahran, Old Scotch…" autofocus
            style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin:4px 0 16px;box-sizing:border-box;font-family:inherit"/>
          <div style="display:flex;gap:8px">
            <button onClick=${()=>setShowNewGame(false)} style="flex:1;background:#292524;color:#d6d3d1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Cancel</button>
            <button onClick=${startGame} style="flex:1;background:#2563eb;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Start</button>
          </div>
        </div>
      </div>`;
  };

  // ---- MODAL: New custom stat ----
  const NewStatModal = () => {
    if (!showNewStat) return null;
    return html`
      <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.7)" onClick=${()=>setShowNewStat(false)}>
        <div style="background:#1c1917;border-radius:12px;padding:20px;width:100%;max-width:384px;border:1px solid #44403c" onClick=${e=>e.stopPropagation()}>
          <h3 style="color:#fff;font-weight:700;margin:0 0 12px">New Custom Stat</h3>
          <input type="text" value=${newStatName} onInput=${e=>setNewStatName(e.target.value)}
            onKeyDown=${e=>e.key==="Enter"&&addCustomStat()} placeholder="e.g. Clearances, Hit Outs, Spoils" autofocus
            style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin-bottom:16px;box-sizing:border-box;font-family:inherit"/>
          <div style="display:flex;gap:8px">
            <button onClick=${()=>setShowNewStat(false)} style="flex:1;background:#292524;color:#d6d3d1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Cancel</button>
            <button onClick=${addCustomStat} style="flex:1;background:#2563eb;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Add</button>
          </div>
        </div>
      </div>`;
  };

  return html`
    <div style="display:flex;flex-direction:column;height:100%">
      <div style="display:flex;align-items:center;background:#1c1917;border-bottom:1px solid #292524;flex-wrap:wrap">
        ${["track","history","compare"].map(v=>html`
          <button key=${v} onClick=${()=>setView(v)}
            style=${{padding:"12px 16px",fontSize:"12px",fontWeight:"900",letterSpacing:".1em",textTransform:"uppercase",background:"none",border:"none",borderBottom:view===v?"2px solid #2563eb":"2px solid transparent",color:view===v?"#60a5fa":"#78716c",cursor:"pointer",fontFamily:"inherit"}}>
            ${v}
          </button>`)}
        <div style="margin-left:auto;display:flex;gap:8px;margin-right:12px;padding:6px 0">
          <button onClick=${exportCSV} disabled=${!games.length}
            style=${{display:"flex",alignItems:"center",gap:"4px",background:"#292524",color:"#fff",padding:"6px 12px",borderRadius:"8px",border:"none",cursor:games.length?"pointer":"not-allowed",fontSize:"12px",fontWeight:"900",opacity:games.length?1:.4,fontFamily:"inherit"}}>
            <${Icon} name="download" size=${12}/> CSV
          </button>
          <button onClick=${()=>setShowNewGame(true)}
            style="background:#2563eb;color:#fff;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:900;font-family:inherit">
            + NEW GAME
          </button>
        </div>
      </div>
      ${view==="track"?html`<${TrackView}/>`
        :view==="history"?html`<${HistoryView}/>`
        :html`<${CompareView}/>`}
      <${GoalModal}/>
      <${NoteModal}/>
      <${NewGameModal}/>
      <${NewStatModal}/>
    </div>`;
}

// ============ APP ============
function App() {
  const [tab, setTab] = useState("whiteboard");
  const [teamName, setTeamName] = useState(()=>lsGet(SK.teamName,"My Team"));
  const [roster, setRoster] = useState(()=>lsGet(SK.roster,[]));
  const [lineup, setLineup] = useState(()=>lsGet(SK.lineup,{}));
  const [games, setGames] = useState(()=>lsGet(SK.games,[]));
  const [customStats, setCustomStats] = useState(()=>lsGet(SK.customStats,[]));
  const [currentGameId, setCurrentGameId] = useState(()=>lsGet(SK.currentGame,null));

  useEffect(()=>lsSave(SK.teamName,teamName),[teamName]);
  useEffect(()=>lsSave(SK.roster,roster),[roster]);
  useEffect(()=>lsSave(SK.lineup,lineup),[lineup]);
  useEffect(()=>lsSave(SK.games,games),[games]);
  useEffect(()=>lsSave(SK.customStats,customStats),[customStats]);
  useEffect(()=>lsSave(SK.currentGame,currentGameId),[currentGameId]);

  const mainTabs=[{id:"whiteboard",label:"BOARD",icon:"edit"},{id:"lineup",label:"LINEUP",icon:"users"},{id:"stats",label:"STATS",icon:"clipboard"}];

  return html`
    <div style="height:100vh;width:100vw;display:flex;flex-direction:column;background:#0c0a09;color:#fff;overflow:hidden;font-family:ui-sans-serif,system-ui,-apple-system,'Helvetica Neue',sans-serif">
      <header style="background:linear-gradient(to right,#1e3a8a,#1c1917,#7f1d1d);border-bottom:2px solid #facc15;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;background:#facc15;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#1c1917;font-weight:900;font-size:18px;flex-shrink:0">⬢</div>
          <div>
            <input type="text" value=${teamName} onInput=${e=>setTeamName(e.target.value)}
              style="background:transparent;color:#fff;font-weight:900;font-size:15px;letter-spacing:.05em;width:160px;border:none;outline:none;font-family:inherit"/>
            <div style="font-size:9px;color:rgba(250,204,21,.8);letter-spacing:.25em;font-weight:700;padding-left:2px">VAFA · COACH BOARD</div>
          </div>
        </div>
        <div style="display:flex;gap:3px;background:rgba(12,10,9,.6);border-radius:8px;padding:3px">
          ${mainTabs.map(t=>html`
            <button key=${t.id} onClick=${()=>setTab(t.id)}
              style=${{display:"flex",alignItems:"center",gap:"5px",padding:"6px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"900",letterSpacing:".1em",background:tab===t.id?"#2563eb":"transparent",color:tab===t.id?"#fff":"#a8a29e",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              <${Icon} name=${t.icon} size=${14} color=${tab===t.id?"#fff":"#a8a29e"}/>
              ${t.label}
            </button>`)}
        </div>
      </header>
      <main style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        ${tab==="whiteboard"?html`<${Whiteboard}/>`
          :tab==="lineup"?html`<${Lineup} roster=${roster} setRoster=${setRoster} lineup=${lineup} setLineup=${setLineup} games=${games} setGames=${setGames} currentGameId=${currentGameId}/>`
          :html`<${Stats} roster=${roster} games=${games} setGames=${setGames} customStats=${customStats} setCustomStats=${setCustomStats} currentGameId=${currentGameId} setCurrentGameId=${setCurrentGameId} teamName=${teamName} setTeamName=${setTeamName}/>`}
      </main>
    </div>`;
}

render(html`<${App}/>`, document.getElementById("app"));

</script>
</body>
</html>
