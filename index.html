      <div style="position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.85)">
        <div style="background:#1c1917;border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:520px;border:1px solid ${isGoal?"rgba(250,204,21,.4)":"rgba(96,165,250,.4)"};max-height:90vh;display:flex;flex-direction:column">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <h3 style="color:#fff;font-weight:900;font-size:16px;margin:0;display:flex;align-items:center;gap:8px">
              <${AflBall} size=${18}/>

            </h3>
            <button onClick=${()=>setHeatmapPending(null)} aria-label="Skip zone"

          <div style="background:#0c0a09;border-radius:10px;padding:8px;display:flex;justify-content:center;flex:1;overflow:hidden">
            <svg viewBox=${`${-M} ${-5} ${FIELD_W+M*2} ${VB_H+5+M}`}

                 style="width:100%;max-height:55vh;display:block;touch-action:manipulation">
              <defs>
                <radialGradient id="hmFieldGrad" cx="50%" cy="20%" r="80%">

                <line x1=${CX-GP_HALF} y1="0" x2=${CX+GP_HALF} y2="0" stroke="#fff" stroke-width="0.6"/>
                <!-- Oval boundary -->
                <ellipse cx=${CX} cy=${CY} rx=${RX} ry=${RY} fill="none" stroke="#fff" stroke-width="0.5"/>
                <!-- 18 ZONE TAP TARGETS -->
                ${HEATMAP_ZONES.map(z => {
                  const ctr = heatmapZoneVisibleCenter(z);
                  return html`
                    <g key=${z.id}>
                      <rect x=${z.x} y=${z.y} width=${z.w} height=${z.h}
                        fill=${isGoal?"rgba(250,204,21,0.06)":"rgba(96,165,250,0.06)"}
                        stroke=${isGoal?"#facc15":"#60a5fa"} stroke-width="0.35" stroke-dasharray="0.6 0.6"
                        style="cursor:pointer"
                        onClick=${()=>confirmHeatmapZone(z.id)}/>
                      <text x=${ctr.cx} y=${ctr.cy+1.0} text-anchor="middle"
                        font-size="2.8" font-weight="900"
                        fill=${isGoal?"#facc15":"#60a5fa"}
                        style="pointer-events:none;font-family:ui-monospace,monospace">${z.id}</text>
                    </g>`;
                })}
              </g>
              <!-- Posts above goal line — drawn outside the clip so they show -->
              <line x1=${CX-GP_HALF} y1="0" x2=${CX-GP_HALF} y2="-3" stroke="#fff" stroke-width="0.7" stroke-linecap="round"/>
              <line x1=${CX+GP_HALF} y1="0" x2=${CX+GP_HALF} y2="-3" stroke="#fff" stroke-width="0.7" stroke-linecap="round"/>
              <line x1=${CX-BP_OFFSET} y1="0" x2=${CX-BP_OFFSET} y2="-2" stroke="#fff" stroke-width="0.5" stroke-linecap="round"/>
              <line x1=${CX+BP_OFFSET} y1="0" x2=${CX+BP_OFFSET} y2="-2" stroke="#fff" stroke-width="0.5" stroke-linecap="round"/>
            </svg>
          </div>
          <button onClick=${()=>setHeatmapPending(null)}
            style="margin-top:10px;padding:10px;background:#292524;color:#d6d3d1;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit">
            Skip — don't record location
          </button>
        </div>
      </div>`;
  })();

  // ---- MODAL: Quarter note ----
  const noteModal = !editNoteQ ? null : html`
    <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.8)" onClick=${saveNote}>
      <div style="background:#1c1917;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px;border:1px solid #1d4ed8" onClick=${e=>e.stopPropagation()}>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <h3 style="color:#fff;font-weight:900;font-size:18px;margin:0">📝 ${editNoteQ} Notes</h3>
          <button onClick=${()=>setEditNoteQ(null)} style="background:none;border:none;cursor:pointer;color:#78716c;display:flex"><${Icon} name="x" size=${20}/></button>
        </div>
        <textarea value=${noteText} onInput=${e=>setNoteText(e.target.value)} autofocus
          placeholder="e.g. Push wide on wings, watch their #7, hold the ball carrier…"
          style="width:100%;height:140px;background:#292524;color:#fff;padding:10px;border-radius:10px;border:1px solid #44403c;font-size:13px;resize:none;font-family:inherit;box-sizing:border-box"/>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button onClick=${()=>setEditNoteQ(null)} style="flex:1;background:#292524;color:#d6d3d1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Cancel</button>
          <button onClick=${saveNote} style="flex:1;background:#2563eb;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Save Note</button>
        </div>
      </div>
    </div>`;

  // ---- MODAL: New game ----
  // Round / time / venue are optional — left blank or default they don't change
  // any existing behaviour. Venue is one of home / away / neutral, chosen via a
  // 3-way pill so it's tap-friendly on iPad.
  const newGameModal = !showNewGame ? null : html`
    <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.7)" onClick=${()=>setShowNewGame(false)}>
      <div style="background:#1c1917;border-radius:12px;padding:20px;width:100%;max-width:420px;border:1px solid #44403c;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch" onClick=${e=>e.stopPropagation()}>
        <h3 style="color:#fff;font-weight:700;margin:0 0 16px">New Game</h3>
        <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Your team</label>
        <input type="text" value=${teamName} onInput=${e=>setTeamName(e.target.value)}
          style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin:4px 0 12px;box-sizing:border-box;font-family:inherit"/>
        <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Opponent</label>
        <input type="text" value=${newOpp} onInput=${e=>setNewOpp(e.target.value)}
          onKeyDown=${e=>e.key==="Enter"&&startGame()} placeholder="e.g. Prahran, Old Scotch…" autofocus
          style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin:4px 0 12px;box-sizing:border-box;font-family:inherit"/>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <div style="flex:1">
            <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Round</label>
            <input type="text" value=${newRound} onInput=${e=>setNewRound(e.target.value)}
              placeholder="e.g. 5, Final, GF"
              style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin-top:4px;box-sizing:border-box;font-family:inherit"/>
          </div>
          <div style="flex:1">
            <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Time</label>
            <input type="text" value=${newTime} onInput=${e=>setNewTime(e.target.value)}
              placeholder="e.g. 2:00 PM"
              style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin-top:4px;box-sizing:border-box;font-family:inherit"/>
          </div>
        </div>
        <label style="font-size:11px;color:#a8a29e;font-weight:700;letter-spacing:.05em">Venue</label>
        <div style="display:flex;background:#292524;border-radius:8px;padding:3px;margin:6px 0 16px">
          ${[
            {id:"home",   label:"HOME",    color:"#2563eb"},
            {id:"away",   label:"AWAY",    color:"#dc2626"},
            {id:"neutral",label:"NEUTRAL", color:"#78716c"}
          ].map(v => html`
            <button key=${v.id} onClick=${()=>setNewVenue(v.id)}
              style=${{flex:1,padding:"8px",borderRadius:"6px",fontSize:"12px",fontWeight:"700",letterSpacing:".05em",background:newVenue===v.id?v.color:"transparent",color:newVenue===v.id?"#fff":"#a8a29e",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              ${v.label}
            </button>
          `)}
        </div>
        <div style="display:flex;gap:8px">
          <button onClick=${()=>setShowNewGame(false)} style="flex:1;background:#292524;color:#d6d3d1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Cancel</button>
          <button onClick=${startGame} style="flex:1;background:#2563eb;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Start</button>
        </div>
      </div>
    </div>`;

  // ---- MODAL: New custom stat ----
  const newStatModal = !showNewStat ? null : html`
    <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.7)" onClick=${()=>setShowNewStat(false)}>
      <div style="background:#1c1917;border-radius:12px;padding:20px;width:100%;max-width:384px;border:1px solid #44403c" onClick=${e=>e.stopPropagation()}>
        <h3 style="color:#fff;font-weight:700;margin:0 0 12px">New Custom Stat</h3>
        <input type="text" value=${newStatName} onInput=${e=>setNewStatName(e.target.value)}
          onKeyDown=${e=>e.key==="Enter"&&addCustomStat()} placeholder="e.g. Clearances, Hit Outs, Spoils" autofocus
          style="width:100%;background:#292524;color:#fff;padding:8px 10px;border-radius:8px;border:1px solid #44403c;font-size:14px;margin-bottom:16px;box-sizing:border-box;font-family:inherit"/>
        <div style="display:flex;gap:8px">
          <button onClick=${()=>setShowNewStat(false)} style="flex:1;background:#292524;color:#d6d3d1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Cancel</button>
          <button onClick=${addCustomStat} style="flex:1;background:#2563eb;color:#fff;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit">Add</button>
        </div>
      </div>
    </div>`;

  return html`
    <div style="display:flex;flex-direction:column;height:100%">
      <div style="display:flex;align-items:center;background:#1c1917;border-bottom:1px solid #292524;flex-wrap:wrap">
        ${["track","ratings","history","compare"].map(v=>html`
          <button key=${v} onClick=${()=>setView(v)}
            style=${{padding:"12px 14px",fontSize:"12px",fontWeight:"900",letterSpacing:".1em",textTransform:"uppercase",background:"none",border:"none",borderBottom:view===v?"2px solid #2563eb":"2px solid transparent",color:view===v?"#60a5fa":"#78716c",cursor:"pointer",fontFamily:"inherit"}}>
            ${v}
          </button>`)}
        <div style="margin-left:auto;display:flex;gap:8px;margin-right:12px;padding:6px 0">
          <button onClick=${view==="ratings" ? exportRatingsCSV : exportCSV} disabled=${!games.length}
            style=${{display:"flex",alignItems:"center",gap:"4px",background:"#292524",color:"#fff",padding:"6px 12px",borderRadius:"8px",border:"none",cursor:games.length?"pointer":"not-allowed",fontSize:"12px",fontWeight:"900",opacity:games.length?1:.4,fontFamily:"inherit"}}
            title=${view==="ratings" ? "Export ratings + notes as CSV" : "Export all stats as CSV"}>
            <${Icon} name="download" size=${12}/> ${view==="ratings" ? "RATINGS CSV" : "CSV"}
          </button>
          <button onClick=${()=>setShowNewGame(true)}
            style="background:#2563eb;color:#fff;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:900;font-family:inherit">
            + NEW GAME
          </button>
        </div>
      </div>
      ${view==="track"?trackView
        :view==="ratings"?ratingsView
        :view==="history"?historyView
        :compareView}
      ${goalModal}
      ${behindModal}
      ${heatmapModal}
      ${noteModal}
      ${newGameModal}
      ${newStatModal}
    </div>`;
}

// ============ APP ============
function App() {
  // ---- Profiles ----
  // Run migration BEFORE anything else, so profile state initializers see the right data.
  // useState initializers only run on first render, so we can call this synchronously.
  if (typeof window !== "undefined" && !window.__aflMigrated) {
    migrateLegacyIfNeeded();
    window.__aflMigrated = true;
  }
  const [profiles, setProfiles] = useState(()=>lsGet(SK_PROFILES, []));
  const [activeId, setActiveId] = useState(()=>{
    const stored = lsGet(SK_ACTIVE, null);
    const list = lsGet(SK_PROFILES, []);
    if (stored && list.find(p=>p.id===stored)) return stored;
    return list.length ? list[0].id : null;
  });
  const [showProfileModal, setShowProfileModal] = useState(false);
  const [profileMenuOpen, setProfileMenuOpen] = useState(false);
  // Main menu (home screen). Shown automatically when no profiles exist yet
  // (first launch). Otherwise the user opens it via the team-name pill in the
  // header to switch teams or create a new one.
  const [showHome, setShowHome] = useState(()=>{
    const list = lsGet(SK_PROFILES, []);
    return list.length === 0;
  });
  // Tutorial overlay. Shown when a brand-new team is created; can be replayed
  // from the main menu.
  const [showTutorial, setShowTutorial] = useState(false);
  const [tutorialStep, setTutorialStep] = useState(0);
  // New-team form state on the main menu.
  const [newTeamName, setNewTeamName] = useState("");
  const [newTeamColor, setNewTeamColor] = useState(DEFAULT_TEAM_COLOR);

  useEffect(()=>lsSave(SK_PROFILES, profiles), [profiles]);
  useEffect(()=>{ if (activeId) lsSave(SK_ACTIVE, activeId); }, [activeId]);

  // ---- Per-profile state (re-loaded when activeId changes) ----
  const [tab, setTab] = useState("whiteboard");
  const [teamName, setTeamName]       = useState(()=>activeId ? pGet(activeId,"teamName","Team 1") : "Team 1");
  const [roster, setRoster]           = useState(()=>activeId ? pGet(activeId,"roster",[]) : []);
  const [lineup, setLineup]           = useState(()=>activeId ? pGet(activeId,"lineup",{}) : {});
  const [games, setGames]             = useState(()=>activeId ? migrateHeatmapZones(pGet(activeId,"games",[])) : []);
  const [customStats, setCustomStats] = useState(()=>activeId ? pGet(activeId,"customStats",[]) : []);
  const [currentGameId, setCurrentGameId] = useState(()=>activeId ? pGet(activeId,"currentGame",null) : null);
  // Whiteboard strokes per mode and saved plays library — also per-profile.
  const [wbFull, setWbFull]     = useState(()=>activeId ? pGet(activeId,"wbFull",[]) : []);
  const [wbHalf, setWbHalf]     = useState(()=>activeId ? pGet(activeId,"wbHalf",[]) : []);
  const [wbBlank, setWbBlank]   = useState(()=>activeId ? pGet(activeId,"wbBlank",[]) : []);
  const [wbLineup, setWbLineup] = useState(()=>activeId ? pGet(activeId,"wbLineup",[]) : []);
  const [plays, setPlays]       = useState(()=>activeId ? pGet(activeId,"plays",[]) : []);

  // When activeId changes, reload everything from that profile's storage.
  // We use a ref to skip the very first run (initial state already came from storage).
  const prevActive = useRef(activeId);
  // Hidden file input for restoring backups from the main menu.
  const restoreInputRef = useRef(null);

  // Read a chosen backup file and apply it. Reloads the page on success so
  // every piece of state re-initialises from the freshly-restored localStorage.
  const handleRestoreFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // allow re-picking the same file later
    if (!file) return;
    if (!confirm("Restore from this backup? It will replace any data currently on this iPad.")) return;
    const reader = new FileReader();
    reader.onload = () => {
      const ok = restoreBackup(reader.result);
      if (ok) {
        alert("Backup restored. The app will now reload.");
        try { window.location.reload(); } catch(err) {}
      }
    };
    reader.onerror = () => alert("Couldn't read that file.");
    reader.readAsText(file);
  };
  useEffect(() => {
    if (prevActive.current === activeId) return;
    prevActive.current = activeId;
    if (!activeId) return;
    setTeamName(pGet(activeId,"teamName","Team 1"));
    setRoster(pGet(activeId,"roster",[]));
    setLineup(pGet(activeId,"lineup",{}));
    setGames(migrateHeatmapZones(pGet(activeId,"games",[])));

        <ul style="margin:0;padding-left:18px;font-size:13px;line-height:1.6;color:#d6d3d1">
          <li>From the <strong>Track</strong>, <strong>History</strong> or <strong>Compare</strong> tabs: full stats CSV with team totals, player stats, opposition, notes, interchange log and ratings.</li>
          <li>From the <strong>Ratings</strong> tab: a separate ratings-only CSV.</li>
        </ul>
        <p style="margin:10px 0 0;font-size:12px;color:#a8a29e;font-style:italic">Because data lives on this iPad, exporting CSVs every now and then is a good way to keep a backup.</p>`
    },
    {
      title: "You're set",
      icon: html`<${AflBall} size=${48}/>`,
      body: html`
        <p style="margin:0 0 10px">That's the lot. A few last things:</p>
        <ul style="margin:0;padding-left:18px;font-size:13px;line-height:1.6;color:#d6d3d1">
          <li>The app works <strong>offline</strong> once it's loaded — no signal needed during games.</li>
          <li>Add it to your iPad Home Screen for full-screen mode.</li>
          <li>You can replay this tutorial any time from the team menu (tap your team name → Replay tutorial).</li>
        </ul>
        <div style="margin:14px 0 0;font-size:13px;color:#facc15;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px">Good luck this season! <${AflBall} size=${18}/></div>`
    }
  ];
  const tStep = tutorialSteps[Math.min(tutorialStep, tutorialSteps.length-1)] || tutorialSteps[0];
  const isLastStep = tutorialStep >= tutorialSteps.length - 1;
  const tutorialOverlay = !showTutorial ? null : html`
    <div style="position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.85)">
      <div style="background:#1c1917;border:1px solid #44403c;border-radius:16px;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.6)">
        <div style="padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #292524">
          <div style="font-size:10px;font-weight:900;color:#facc15;letter-spacing:.2em">STEP ${tutorialStep+1} OF ${tutorialSteps.length}</div>
          <button onClick=${finishTutorial} style="background:none;border:none;cursor:pointer;color:#78716c;display:flex"><${Icon} name="x" size=${20}/></button>
        </div>
        <div style="padding:20px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1">
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
            <div style="flex-shrink:0">${tStep.icon}</div>
            <h2 style="margin:0;color:#fff;font-size:20px;font-weight:900;line-height:1.2">${tStep.title}</h2>
          </div>
          <div style="color:#d6d3d1;font-size:14px;line-height:1.55">${tStep.body}</div>
        </div>
        <div style="padding:14px 18px;border-top:1px solid #292524;display:flex;align-items:center;gap:10px">
          ${tutorialStep > 0 ? html`
            <button onClick=${()=>setTutorialStep(s=>Math.max(0,s-1))}
              style="background:transparent;border:1px solid #44403c;color:#a8a29e;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;font-size:12px;letter-spacing:.1em">
              ← BACK
            </button>` : html`
            <button onClick=${finishTutorial}
              style="background:transparent;border:1px solid #44403c;color:#78716c;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-family:inherit;font-size:12px;letter-spacing:.1em">
              SKIP
            </button>`}
          <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px">
            ${tutorialSteps.map((_,i) => html`<span key=${i} style=${{width:i===tutorialStep?16:6,height:6,borderRadius:3,background:i===tutorialStep?"#facc15":"#44403c",transition:"width .2s"}}/>`)}
          </div>
          <button onClick=${()=>{ if (isLastStep) finishTutorial(); else setTutorialStep(s=>s+1); }}
            style="background:#2563eb;border:none;color:#fff;padding:10px 16px;border-radius:8px;cursor:pointer;font-weight:900;font-family:inherit;font-size:12px;letter-spacing:.1em">
            ${isLastStep ? "GET STARTED" : "NEXT →"}
          </button>
        </div>
      </div>
    </div>`;

  // If there's no active team yet (very first launch, before they create one),
  // render only the home screen.
  if (!activeId) {
    return html`<div style="height:100vh;width:100vw;background:#0c0a09;color:#fff;font-family:ui-sans-serif,system-ui,-apple-system,'Helvetica Neue',sans-serif">${homeScreen}${tutorialOverlay}</div>`;
  }

  return html`
    <div style="height:100vh;width:100vw;display:flex;flex-direction:column;background:#0c0a09;color:#fff;overflow:hidden;font-family:ui-sans-serif,system-ui,-apple-system,'Helvetica Neue',sans-serif">
      <header class="app-header" style="background:linear-gradient(to right,#1e3a8a,#1c1917,#7f1d1d);border-bottom:2px solid #facc15;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;flex-shrink:0;padding:6px 10px">
        <div style="display:flex;align-items:center;gap:10px">
          <button onClick=${()=>setShowHome(true)} title="Main menu"
            style="width:34px;height:34px;background:#facc15;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;padding:0;font-family:inherit"
            aria-label="Main menu">
            <${AflBall} size=${22}/>
          </button>
          <div style="display:flex;flex-direction:column">
            <button onClick=${()=>setProfileMenuOpen(o=>!o)}
              style="background:rgba(0,0,0,.3);border:1px solid rgba(250,204,21,.3);color:#fff;font-weight:900;font-size:14px;letter-spacing:.05em;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;max-width:220px">
              <span style=${{width:10,height:10,borderRadius:"50%",background:(activeProf&&activeProf.color)||DEFAULT_TEAM_COLOR,border:"1px solid rgba(255,255,255,.4)",flexShrink:0}}/>
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:left">${activeName||"Team 1"}</span>
              <span style="font-size:10px;color:#facc15">▼</span>
            </button>
            <div style="font-size:9px;color:rgba(250,204,21,.8);letter-spacing:.25em;font-weight:700;padding-left:4px;margin-top:2px">AFL COACHING · GAME DAY</div>
          </div>
        </div>
        <div style="display:flex;gap:3px;background:rgba(12,10,9,.6);border-radius:8px;padding:3px">
          ${mainTabs.map(t=>html`
            <button key=${t.id} onClick=${()=>setTab(t.id)}
              style=${{display:"flex",alignItems:"center",gap:"5px",padding:"6px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"900",letterSpacing:".1em",background:tab===t.id?"#2563eb":"transparent",color:tab===t.id?"#fff":"#a8a29e",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              <${Icon} name=${t.icon} size=${14} color=${tab===t.id?"#fff":"#a8a29e"}/>
              ${t.label}
            </button>`)}
        </div>
      </header>
      <main style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        ${tab==="whiteboard"?html`<${Whiteboard} wbFull=${wbFull} setWbFull=${setWbFull} wbHalf=${wbHalf} setWbHalf=${setWbHalf} wbBlank=${wbBlank} setWbBlank=${setWbBlank} wbLineup=${wbLineup} setWbLineup=${setWbLineup} plays=${plays} setPlays=${setPlays} roster=${roster} lineup=${lineup}/>`
          :tab==="lineup"?html`<${Lineup} roster=${roster} setRoster=${setRoster} lineup=${lineup} setLineup=${setLineup} games=${games} setGames=${setGames} currentGameId=${currentGameId}/>`
          :html`<${Stats} roster=${roster} games=${games} setGames=${setGames} customStats=${customStats} setCustomStats=${setCustomStats} currentGameId=${currentGameId} setCurrentGameId=${setCurrentGameId} teamName=${teamName} setTeamName=${setTeamName}/>`}
      </main>
      ${profileMenu}
      ${profileModal}
      ${homeScreen}
      ${tutorialOverlay}
    </div>`;
}

render(html`<${App}/>`, document.getElementById("app"));



</script>
</body>
</html>
