// ============ STATS ============
function calcScore(game) {
  if (!game) return {goals:0,behinds:0,points:0};
  let goals=0, behinds=0;
  QUARTERS.forEach(q=>{
    goals += (game.stats.team[q]&&game.stats.team[q]["Goals"])||0;
    behinds += (game.stats.team[q]&&game.stats.team[q]["Behinds"])||0;
  });
  return {goals, behinds, points:goals*6+behinds};
}
function calcQScore(game,q) {
  if (!game) return {goals:0,behinds:0,points:0};
  const g=(game.stats.team[q]&&game.stats.team[q]["Goals"])||0;
  const b=(game.stats.team[q]&&game.stats.team[q]["Behinds"])||0;
  return {goals:g,behinds:b,points:g*6+b};
}

// ============ PLAYER STATS TABLE ============
// Rows = players (sorted by jersey #), columns = stats with +/- buttons
function PlayerStatsTable({cg, roster, allStats, customStats, quarter, applyUpdate, setCustomStats, setShowNewStat, noteStrip, scrollRef, onScroll}) {
  // Sort active players by number (numeric), then by name
  const activePlayers = roster.filter(p=>!p.status||p.status===STATUS.ACTIVE);
  const sorted = [...activePlayers].sort((a,b) => {
    const an = parseInt(a.number,10), bn = parseInt(b.number,10);
    const aValid = !isNaN(an), bValid = !isNaN(bn);
    if (aValid && bValid) return an - bn;
    if (aValid) return -1;
    if (bValid) return 1;
    return a.name.localeCompare(b.name);
  });
  const q = QUARTERS[quarter];
  const playerVal = (pid, stat) => (cg.stats.players[pid] && cg.stats.players[pid][q] && cg.stats.players[pid][q][stat]) || 0;
  // Game total across all four quarters for a player. Shown in brackets when
  // not on Q1 so the coach sees both the per-quarter and the running total.
  const playerGameVal = (pid, stat) => {
    if (!cg.stats.players[pid]) return 0;
    let t = 0;
    QUARTERS.forEach(qq => { t += (cg.stats.players[pid][qq] && cg.stats.players[pid][qq][stat]) || 0; });
    return t;
  };

  if (!sorted.length) {
    return html`
      <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px">
        <div style="text-align:center;max-width:300px">
          <div style="color:#a8a29e;font-size:14px;margin-bottom:8px">No active players</div>
          <div style="color:#78716c;font-size:12px">Add players in the LINEUP tab → ROSTER → EDIT.</div>
        </div>
      </div>`;
  }

  // Column width — keep stat columns reasonable for horizontal scrolling on iPad
  const NAME_COL = 140; // px
  const STAT_COL = 92;  // px (+/- buttons + count)

  return html`
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div ref=${scrollRef} onScroll=${onScroll} style="flex:1;overflow:auto;-webkit-overflow-scrolling:touch">
        <table style=${{borderCollapse:"separate",borderSpacing:"0",width:"max-content",minWidth:"100%"}}>
          <thead>
            <tr>
              <th style=${{position:"sticky",top:"0",left:"0",zIndex:"3",background:"#0c0a09",borderBottom:"2px solid #292524",borderRight:"1px solid #292524",padding:"10px 12px",textAlign:"left",fontSize:"10px",fontWeight:"900",letterSpacing:".1em",color:"#a8a29e",width:NAME_COL+"px",minWidth:NAME_COL+"px"}}>PLAYER</th>
              ${allStats.map(stat=>{
                const isScore = stat==="Goals"||stat==="Behinds";
                return html`
                  <th key=${stat} style=${{position:"sticky",top:"0",zIndex:"2",background:"#0c0a09",borderBottom:"2px solid #292524",padding:"8px 4px",textAlign:"center",fontSize:"10px",fontWeight:"900",letterSpacing:".05em",color:isScore?"#facc15":"#a8a29e",width:STAT_COL+"px",minWidth:STAT_COL+"px",textTransform:"uppercase"}}>
                    <div style="display:flex;align-items:center;justify-content:center;gap:4px">
                      <span>${stat}</span>
                      ${customStats.includes(stat)?html`<button onClick=${()=>setCustomStats(prev=>prev.filter(x=>x!==stat))} style="background:none;border:none;cursor:pointer;color:#57534e;display:flex"><${Icon} name="x" size=${10}/></button>`:null}
                    </div>
                  </th>`;
              })}
              <th style=${{position:"sticky",top:"0",zIndex:"2",background:"#0c0a09",borderBottom:"2px solid #292524",padding:"4px",width:"56px",minWidth:"56px"}}>
                <button onClick=${()=>setShowNewStat(true)}
                  style="background:transparent;border:1.5px dashed #44403c;border-radius:6px;padding:6px 8px;color:#78716c;cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;display:flex;align-items:center;gap:3px;margin:0 auto">
                  <${Icon} name="plus" size=${10} color="#78716c"/> ADD
                </button>
              </th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map((p,idx)=>{
              const rowBg = idx % 2 === 0 ? "#0c0a09" : "#161311";
              return html`
                <tr key=${p.id}>
                  <td style=${{position:"sticky",left:"0",zIndex:"1",background:rowBg,borderBottom:"1px solid #292524",borderRight:"1px solid #292524",padding:"6px 10px",width:NAME_COL+"px",minWidth:NAME_COL+"px"}}>
                    <div style="display:flex;align-items:center;gap:8px">
                      <div style="width:30px;height:30px;border-radius:6px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px;flex-shrink:0">
                        ${p.number || p.name.slice(0,1).toUpperCase()}
                      </div>
                      <div style="min-width:0;flex:1">
                        <div style="font-size:12px;color:#fff;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2">${p.name}</div>
                        ${p.number?html`<div style="font-size:10px;color:#78716c">#${p.number}</div>`:null}
                      </div>
                    </div>
                  </td>
                  ${allStats.map(stat=>{
                    const isScore = stat==="Goals"||stat==="Behinds";
                    const v = playerVal(p.id, stat);
                    return html`
                      <td key=${stat} style=${{background:rowBg,borderBottom:"1px solid #292524",padding:"4px",textAlign:"center",width:STAT_COL+"px",minWidth:STAT_COL+"px"}}>
                        <div style="display:flex;align-items:center;justify-content:center;gap:3px">
                          <button onClick=${()=>applyUpdate(stat,-1,p.id)}
                            style="width:26px;height:30px;border-radius:5px;background:#292524;color:#d6d3d1;border:none;cursor:pointer;font-size:14px;font-weight:900;font-family:inherit;display:flex;align-items:center;justify-content:center">−</button>
                          <div style="display:flex;flex-direction:column;align-items:center;min-width:24px">
                            <span style=${{fontSize:"16px",fontWeight:"900",color:v>0?(isScore?"#facc15":"#fff"):"#57534e",fontVariantNumeric:"tabular-nums",lineHeight:"1"}}>${v}</span>
                            ${quarter > 0 ? html`<span style=${{fontSize:"9px",fontWeight:"700",color:"#78716c",fontVariantNumeric:"tabular-nums",lineHeight:"1.2"}}>(${playerGameVal(p.id, stat)})</span>` : null}
                          </div>
                          <button onClick=${()=>applyUpdate(stat,1,p.id)}
                            style=${{width:"26px",height:"30px",borderRadius:"5px",background:isScore?"#facc15":"#2563eb",color:isScore?"#1c1917":"#fff",border:"none",cursor:"pointer",fontSize:"14px",fontWeight:"900",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                        </div>
                      </td>`;
                  })}
                  <td style=${{background:rowBg,borderBottom:"1px solid #292524",width:"56px",minWidth:"56px"}}/>
                </tr>`;
            })}
          </tbody>
        </table>
      </div>
      <div style="background:#1c1917;border-top:1px solid #292524">
        ${noteStrip}
      </div>
    </div>`;
}

function Stats({roster, games, setGames, customStats, setCustomStats, currentGameId, setCurrentGameId, teamName, setTeamName}) {
  const [view, setView] = useState("track");
  const [quarter, setQuarter] = useState(0);
  const [scope, setScope] = useState("team");
  const [selPlayer, setSelPlayer] = useState(null);
  const [showNewStat, setShowNewStat] = useState(false);
  const [newStatName, setNewStatName] = useState("");
  const [showNewGame, setShowNewGame] = useState(false);
  const [newOpp, setNewOpp] = useState("");
  // COMPARE has four sub-tabs so the coach can show team comparisons to the
  // whole squad without exposing individual ratings/notes. State is local to
  // the session — not persisted.
  const [compareSubView, setCompareSubView] = useState("team");
  // COMPARE → PLAYER lets the coach drill into a single player. "" means
  // "show all players in the totals table".
  const [comparePid, setComparePid] = useState("");
  // PRESENT MODE — when true, COMPARE switches to a low-density, big-text
  // layout suitable for plugging the iPad into a TV at a team meeting. It
  // hides individual numbers in the per-player views and emphasises bars and
  // totals. Local to the session.
  const [presentMode, setPresentMode] = useState(false);
  // Optional new-game fields. Round can be a number ("12") or label ("Final");
  // time is HH:MM in 24h or whatever the user types; venue is one of home/away/neutral.
  const [newRound, setNewRound] = useState("");
  const [newTime, setNewTime] = useState("");
  const [newVenue, setNewVenue] = useState("home");
  const [goalPending, setGoalPending] = useState(false);
  // Behind prompt — like the goal-kicker prompt, but with an extra "Rushed"
  // option (rushed behinds are common in AFL — defender forced to put it
  // through, no kicker attribution, no heatmap zone).
  const [behindPending, setBehindPending] = useState(false);
  // After a goal/behind is attributed (and not rushed), the heatmap modal
  // opens to record where on the forward 50 the shot came from. Holds
  // {type:"goal"|"behind", playerId} or null.
  const [heatmapPending, setHeatmapPending] = useState(null);
  // COMPARE → HEATMAP filter: "" means all games, otherwise a game id.
  const [heatmapGameFilter, setHeatmapGameFilter] = useState("");
  // 20-MIN COUNTDOWN TIMER — sits in the scoreboard between the two team
  // scores on TRACK. Counts down from 20:00. Coach can start, pause, reset.
  // Reset returns to 20:00 — used at the start of every quarter. State is
  // session-only (not persisted) — a stale value carrying over between
  // launches would be confusing.
  const QUARTER_LEN_S = 20 * 60;
  const [timerSec, setTimerSec] = useState(QUARTER_LEN_S);
  const [timerRunning, setTimerRunning] = useState(false);
  useEffect(() => {
    if (!timerRunning) return;
    const id = setInterval(() => {
      setTimerSec(prev => {
        const next = prev - 1;
        if (next <= 0) { setTimerRunning(false); return 0; }
        return next;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [timerRunning]);
  const fmtTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const [editNoteQ, setEditNoteQ] = useState(null);
  const [noteText, setNoteText] = useState("");

  // Preserve scroll position across re-renders. Tapping a +/- button on a stat
  // triggers a setGames re-render; on iOS Safari mid-momentum-scroll, the
  // browser sometimes resets scrollTop to 0 when the DOM updates. We save the
  // scroll position before each render and restore it immediately after, so
  // the user stays where they were even after incrementing a stat.
  const teamScrollRef = useRef(null);
  const playerScrollRef = useRef(null);
  const savedScroll = useRef({team: 0, player: 0});
  // Capture scroll BEFORE re-render so we know the value to restore to.
  // Listening once on the element via onScroll keeps the saved value fresh.
  const onTeamScroll  = (e) => { savedScroll.current.team   = e.target.scrollTop; };
  const onPlayerScroll= (e) => { savedScroll.current.player = e.target.scrollTop; };
  // After every render, restore the saved position to whichever container is now visible.
  useLayoutEffect(() => {
    if (scope==="team" && teamScrollRef.current) {
      teamScrollRef.current.scrollTop = savedScroll.current.team;
    } else if (scope==="player" && playerScrollRef.current) {
      playerScrollRef.current.scrollTop = savedScroll.current.player;
    }
  });

  const cg = games.find(g=>g.id===currentGameId);
  // Dedupe: a user may have previously added one of the new default stats
  // (Clearances, Hit Outs, Inside 50) as a custom stat. Keep DEFAULT_STATS
  // first so the column order matches the standard layout.
  const allStats = [...DEFAULT_STATS, ...customStats.filter(s => !DEFAULT_STATS.includes(s))];

  const startGame = () => {
    if (!newOpp.trim()) return;
    const game = {
      id:`g_${Date.now()}`, opponent:newOpp.trim(), date:new Date().toISOString(),
      // Optional fixture details — round number/label, kickoff time, and venue type.
      // Stored as plain strings so older games (without these fields) still render.
      round: newRound.trim() || "",
      time: newTime.trim() || "",
      venue: newVenue || "home",      // one of "home" | "away" | "neutral"
      opponentScore:{goals:0,behinds:0},
      stats:{
        team:{Q1:{},Q2:{},Q3:{},Q4:{}},
        players:{},
        opp:{Q1:{},Q2:{},Q3:{},Q4:{}}
      },
      quarterNotes:{Q1:"",Q2:"",Q3:"",Q4:""},
      ratings:{},
      // Per-shot location data — populated by the heatmap modal that pops up
      // after a goal/behind is attributed to a player. Each entry is
      // {quarter, type:"goal"|"behind", zone:1-18, playerId}. Rushed behinds
      // and unattributed shots are skipped (no zone recorded).
      shotHeatmap:[],
      shotHeatmapVersion:2,    // current zone-numbering version (see migrateHeatmapZones)
      interchangeLog:[]
    };
    setGames(prev=>[...prev,game]);
    setCurrentGameId(game.id);
    setNewOpp(""); setNewRound(""); setNewTime(""); setNewVenue("home");
    setShowNewGame(false); setView("track");
  };

  // Update an opposition stat for the active quarter.
  const updateOppStat = (stat, delta) => {
    if (!cg) return;
    const q = QUARTERS[quarter];
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      if (!ng.stats.opp) ng.stats.opp = {Q1:{},Q2:{},Q3:{},Q4:{}};
      if (!ng.stats.opp[q]) ng.stats.opp[q] = {};
      ng.stats.opp[q][stat] = Math.max(0, (ng.stats.opp[q][stat]||0) + delta);
      // Keep opponentScore mirrored when Goals/Behinds change so the scoreboard
      // updates without a separate input. We sum across all quarters to derive it.
      if (stat === "Goals" || stat === "Behinds") {
        let total = 0;
        QUARTERS.forEach(qq => { total += (ng.stats.opp[qq] && ng.stats.opp[qq][stat]) || 0; });
        if (!ng.opponentScore) ng.opponentScore = {goals:0, behinds:0};
        if (stat === "Goals") ng.opponentScore.goals = total;
        else ng.opponentScore.behinds = total;
      }
      return ng;
    }));
  };

  const applyUpdate = (stat, delta, pid) => {
    if (!cg) return;
    const q = QUARTERS[quarter];
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      ng.stats.team[q][stat] = Math.max(0,(ng.stats.team[q][stat]||0)+delta);
      if (!ng.stats.players[pid]) ng.stats.players[pid]={Q1:{},Q2:{},Q3:{},Q4:{}};
      ng.stats.players[pid][q][stat] = Math.max(0,(ng.stats.players[pid][q][stat]||0)+delta);
      return ng;
    }));
  };

  // Wrapper used by the per-player +/- buttons in PlayerStatsTable. After
  // adding a Goal or Behind to a specific player, we want the heatmap zone
  // popup so the coach can record where the shot came from. Other stats
  // (Kicks, Tackles…) and decrements pass straight through.
  const applyUpdateMaybeHeatmap = (stat, delta, pid) => {
    applyUpdate(stat, delta, pid);
    if (delta > 0 && pid && pid !== UNK && (stat === "Goals" || stat === "Behinds")) {
      setHeatmapPending({ type: stat === "Goals" ? "goal" : "behind", playerId: pid });
    }
  };

  const updateStat = (stat, delta) => {
    if (!cg) return;
    if (scope==="player") {
      if(!selPlayer)return;
      applyUpdateMaybeHeatmap(stat,delta,selPlayer);
      return;
    }
    if (stat==="Goals"   && delta>0 && roster.length>0) { setGoalPending(true);   return; }
    if (stat==="Behinds" && delta>0 && roster.length>0) { setBehindPending(true); return; }
    applyUpdate(stat,delta,UNK);
  };

  // Confirm callbacks for the goal/behind modals. Attributed kicker → record
  // the stat AND prompt for heatmap zone. Unattributed → record stat only,
  // no zone (we don't know who/where). Rushed (behinds only) → record stat
  // unattributed, no zone (nobody kicked it deliberately).
  const confirmKicker = (pid) => {
    applyUpdate("Goals",1,pid);
    setGoalPending(false);
    setHeatmapPending({ type: "goal", playerId: pid });
  };
  const confirmGoalUnattributed = () => {
    applyUpdate("Goals",1,UNK);
    setGoalPending(false);
  };
  const confirmBehindKicker = (pid) => {
    applyUpdate("Behinds",1,pid);
    setBehindPending(false);
    setHeatmapPending({ type: "behind", playerId: pid });
  };
  const confirmBehindUnattributed = () => {
    applyUpdate("Behinds",1,UNK);
    setBehindPending(false);
  };
  const confirmBehindRushed = () => {
    // Rushed behinds get scored to the team but not to any player and have
    // no heatmap zone — they're not deliberate shots.
    applyUpdate("Behinds",1,UNK);
    setBehindPending(false);
  };

  // Record a shot location once the coach taps a zone in the heatmap modal.
  const confirmHeatmapZone = (zone) => {
    if (!heatmapPending || !cg) return;
    const q = QUARTERS[quarter];
    const entry = { quarter: q, type: heatmapPending.type, zone, playerId: heatmapPending.playerId };
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      if (!Array.isArray(ng.shotHeatmap)) ng.shotHeatmap = [];
      ng.shotHeatmap.push(entry);
      return ng;
    }));
    setHeatmapPending(null);
  };

  // Scoreboard +/- buttons update the away score directly. We also write into
  // the per-quarter opp stats for the active quarter so the away-quarter-stats
  // panel stays in sync. (Names in this app: opponentScore is the running total,
  // stats.opp[Q].Goals/Behinds is the per-quarter record.)
  const updateOpp = (k, delta) => {
    if (!cg) return;
    const q = QUARTERS[quarter];
    const stat = k === "goals" ? "Goals" : "Behinds";
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      if (!ng.stats.opp) ng.stats.opp = {Q1:{},Q2:{},Q3:{},Q4:{}};
      if (!ng.stats.opp[q]) ng.stats.opp[q] = {};
      ng.stats.opp[q][stat] = Math.max(0, (ng.stats.opp[q][stat]||0) + delta);
      // Re-derive opponentScore from the sum across quarters
      let total = 0;
      QUARTERS.forEach(qq => { total += (ng.stats.opp[qq] && ng.stats.opp[qq][stat]) || 0; });
      if (!ng.opponentScore) ng.opponentScore = {goals:0, behinds:0};
      ng.opponentScore[k] = total;
      return ng;
    }));
  };

  const saveNote = () => {
    if (!cg||!editNoteQ) return;
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const qn = {...(g.quarterNotes||{})};
      qn[editNoteQ] = noteText;
      return {...g, quarterNotes:qn};
    }));
    setEditNoteQ(null); setNoteText("");
  };

  const addCustomStat = () => {
    const n=newStatName.trim();
    if (!n||allStats.includes(n)) return;
    setCustomStats(prev=>[...prev,n]);
    setNewStatName(""); setShowNewStat(false);
  };

  const getVal = (stat) => {
    if (!cg) return 0;
    const q=QUARTERS[quarter];
    if (scope==="team") return (cg.stats.team[q]&&cg.stats.team[q][stat])||0;
    if (selPlayer&&cg.stats.players[selPlayer]) return (cg.stats.players[selPlayer][q]&&cg.stats.players[selPlayer][q][stat])||0;
    return 0;
  };
  // Game-total helper: sum across all four quarters for the current game.
  // Used to render "Q-value (game-total)" so coaches can see the running total
  // alongside the per-quarter number when on Q2/Q3/Q4.
  const getGameVal = (stat, pid) => {
    if (!cg) return 0;
    let t = 0;
    QUARTERS.forEach(qq => {
      if (pid) {
        if (cg.stats.players[pid] && cg.stats.players[pid][qq]) t += cg.stats.players[pid][qq][stat] || 0;
      } else {
        if (cg.stats.team[qq]) t += cg.stats.team[qq][stat] || 0;
      }
    });
    return t;
  };
  // Also: away-team quarter and game-total values
  const getOppQVal = (stat) => {
    if (!cg) return 0;
    const q = QUARTERS[quarter];
    return (cg.stats.opp && cg.stats.opp[q] && cg.stats.opp[q][stat]) || 0;
  };
  const getOppGameVal = (stat) => {
    if (!cg) return 0;
    let t = 0;
    QUARTERS.forEach(qq => {
      if (cg.stats.opp && cg.stats.opp[qq]) t += cg.stats.opp[qq][stat] || 0;
    });
    return t;
  };

  const getTotal = (stat,gid,type,pid) => {
    const g=games.find(x=>x.id===gid); if(!g)return 0;
    let t=0;
    QUARTERS.forEach(q=>{
      if(type==="team") t+=(g.stats.team[q]&&g.stats.team[q][stat])||0;
      else if(pid&&g.stats.players[pid]) t+=(g.stats.players[pid][q]&&g.stats.players[pid][q][stat])||0;
    });
    return t;
  };

  const deleteGame = (id) => {
    if (!confirm("Delete this game and all its stats?")) return;
    setGames(prev=>prev.filter(g=>g.id!==id));
    if (currentGameId===id) setCurrentGameId(null);
  };

  // Set a player's star rating (0–5) for the active game. 0 means "cleared".
  const setRating = (pid, rating) => {
    if (!cg) return;
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      if (!ng.ratings) ng.ratings = {};
      if (!ng.ratings[pid]) ng.ratings[pid] = {rating:0, notes:""};
      ng.ratings[pid].rating = rating;
      return ng;
    }));
  };
  // Set a player's free-text notes for the active game.
  const setRatingNotes = (pid, notes) => {
    if (!cg) return;
    setGames(prev=>prev.map(g=>{
      if (g.id!==currentGameId) return g;
      const ng = JSON.parse(JSON.stringify(g));
      if (!ng.ratings) ng.ratings = {};
      if (!ng.ratings[pid]) ng.ratings[pid] = {rating:0, notes:""};
      ng.ratings[pid].notes = notes;
      return ng;
    }));
  };

  const pName = (pid) => {
    if(pid===UNK)return "Unattributed";
    const p=roster.find(x=>x.id===pid);
    return p?(p.number?`#${p.number} `:"")+(p.name):"Unknown";
  };

  const exportCSV = () => {
    if (!games.length) return;
    const rows=[["Game","Date","Round","Time","Venue","Opponent","Quarter","Scope","Player",...allStats]];
    games.forEach(g=>{
      const d=new Date(g.date).toLocaleDateString();
      const r = g.round || "", t = g.time || "", v = g.venue || "";
      QUARTERS.forEach(q=>{
        const tr=[`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,q,"Team","—"];
        allStats.forEach(s=>tr.push((g.stats.team[q]&&g.stats.team[q][s])||0));
        rows.push(tr);
        Object.keys(g.stats.players).forEach(pid=>{
          const pr=[`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,q,"Player",pName(pid)];
          allStats.forEach(s=>pr.push((g.stats.players[pid][q]&&g.stats.players[pid][q][s])||0));
          rows.push(pr);
        });
        // Away (opposition) quarter stats — only include if any value recorded.
        if (g.stats.opp && g.stats.opp[q]) {
          const opp = g.stats.opp[q];
          const hasAny = allStats.some(s => (opp[s]||0) > 0);
          if (hasAny) {
            const or=[`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,q,"Opponent","—"];
            allStats.forEach(s=>or.push(opp[s]||0));
            rows.push(or);
          }
        }
      });
      QUARTERS.forEach(q=>{const note=(g.quarterNotes||{})[q];if(note)rows.push([`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,q,"Note",note]);});
      (g.interchangeLog||[]).forEach(ic=>rows.push([`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,ic.time,"Interchange",`${ic.player1Name}(${ic.slot1})⇄${ic.player2Name}(${ic.slot2})`]));
      // Ratings rows — one per rated player.
      const ratings = g.ratings || {};
      Object.keys(ratings).forEach(pid => {
        const rt = ratings[pid];
        if (!rt || (!rt.rating && !rt.notes)) return;
        rows.push([`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,"RATING",pName(pid),rt.rating||"",rt.notes||""]);
      });
      const ts=calcScore(g), os=g.opponentScore||{goals:0,behinds:0};
      rows.push([`${teamName} vs ${g.opponent}`,d,r,t,v,g.opponent,"FINAL","Score",`${teamName}: ${ts.goals}.${ts.behinds}(${ts.points}) vs ${g.opponent}: ${os.goals}.${os.behinds}(${os.goals*6+os.behinds})`]);
    });
    const csv=rows.map(r=>r.map(c=>{const s=String(c??"");return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:`${s}`;}).join(",")).join("\n");
    const url=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    const a=document.createElement("a");
    a.href=url; a.download=`${teamName.replace(/\s+/g,"_")}_stats_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  // Dedicated CSV export of player ratings + notes across all games. The notes
  // can be long and contain commas/quotes/newlines, so they get quoted properly.
  const exportRatingsCSV = () => {
    if (!games.length) return;
    const rows = [["Game","Date","Round","Time","Venue","Opponent","Player","Number","Rating (1-5)","Notes"]];
    games.forEach(g => {
      const d = new Date(g.date).toLocaleDateString();
      const ratings = g.ratings || {};
      const r = g.round || "", t = g.time || "", v = g.venue || "";
      // Include every player in the roster, even if no rating recorded yet, so
      // the export shows a complete picture per game.
      roster.forEach(p => {
        const rt = ratings[p.id] || {rating:0, notes:""};
        if (rt.rating === 0 && !rt.notes) return; // skip empty entries
        rows.push([
          `${teamName} vs ${g.opponent}`, d, r, t, v, g.opponent,
          p.name, p.number || "",
          rt.rating || "",
          rt.notes || ""
        ]);
      });
    });
    const csv = rows.map(r => r.map(c => {
      const s = String(c ?? "");
      return s.includes(",") || s.includes('"') || s.includes("\n")
        ? `"${s.replace(/"/g,'""')}"` : s;

    return html`
      <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        ${scoreboard}
        <div style="padding:10px 12px;background:#1c1917;border-bottom:1px solid #292524;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div style="font-size:11px;font-weight:900;letter-spacing:.1em;color:#facc15;display:flex;align-items:center;gap:6px">
            ⭐ PLAYER RATINGS — ${cg.opponent}
          </div>
          <span style="font-size:10px;color:#78716c;font-style:italic">Tap stars to rate. Type notes for any player.</span>
        </div>
        ${sorted.length === 0 ? html`
          <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px">
            <div style="color:#78716c;font-size:13px;text-align:center">No active players. Add players in the LINEUP tab.</div>
          </div>
        ` : html`
          <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;background:#0c0a09">
            <div style="display:flex;flex-direction:column;gap:8px;max-width:760px;margin:0 auto">
              ${sorted.map(p => {
                const r = ratings[p.id] || {rating:0, notes:""};
                return html`
                  <div key=${p.id} style="background:#1c1917;border-radius:10px;border:1px solid #292524;padding:12px">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                      <div style="width:36px;height:36px;border-radius:8px;background:#1d4ed8;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0">
                        ${p.number || p.name.slice(0,1).toUpperCase()}
                      </div>
                      <div style="flex:1;min-width:0">
                        <div style="font-size:14px;color:#fff;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>
                        ${p.number ? html`<div style="font-size:10px;color:#78716c">#${p.number}</div>` : null}
                      </div>
                      <div style="display:flex;gap:2px">
                        ${[1,2,3,4,5].map(n => html`
                          <button key=${n}
                            onClick=${()=>setRating(p.id, r.rating === n ? 0 : n)}
                            aria-label=${`${n} star${n>1?'s':''}`}
                            style=${{background:"transparent",border:"none",cursor:"pointer",padding:"4px",fontSize:"22px",lineHeight:"1",color:n <= r.rating ? "#facc15" : "#44403c",fontFamily:"inherit"}}>★</button>
                        `)}
                      </div>
                    </div>
                    <textarea
                      value=${r.notes || ""}
                      onInput=${e => setRatingNotes(p.id, e.target.value)}
                      placeholder="Notes for this game — what worked, what to work on, set positions, etc."
                      rows="2"
                      style="width:100%;background:#0c0a09;color:#fff;padding:8px 10px;border-radius:6px;border:1px solid #292524;font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box;line-height:1.4"></textarea>
                  </div>`;
              })}
            </div>
          </div>
        `}
      </div>`;
  })();


  const compareView = !games.length
    ? html`<div style="text-align:center;color:#78716c;padding:48px 12px;font-size:13px">No games to compare yet.</div>`
    : (() => {
    const sorted=[...games].sort((a,b)=>new Date(a.date)-new Date(b.date));
    // Goal kickers tally — used in the team sub-view so we can show top scorers.
    const kickerTotals={};
    sorted.forEach(g=>Object.keys(g.stats.players).forEach(pid=>{
      if(!kickerTotals[pid])kickerTotals[pid]=0;
      QUARTERS.forEach(q=>{kickerTotals[pid]+=((g.stats.players[pid][q]&&g.stats.players[pid][q]["Goals"])||0);});
    }));
    const topKickers=Object.entries(kickerTotals).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a).slice(0,8);

    // ---- TEAM sub-view: totals by game, top scorers, us-vs-them differential ----
    const teamSection = html`
      <div>
        <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:12px">TEAM TOTALS BY GAME</div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="border-bottom:1px solid #292524">
                <th style="text-align:left;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">GAME</th>
                <th style="text-align:right;padding:6px 8px;color:#a8a29e;font-size:11px">RESULT</th>
                ${allStats.map(s=>html`<th key=${s} style="text-align:right;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">${s}</th>`)}
              </tr></thead>
              <tbody>
                ${sorted.map(g=>{
                  const ts=calcScore(g), os=g.opponentScore||{goals:0,behinds:0};
                  const won=ts.points>(os.goals*6+os.behinds);
                  return html`<tr key=${g.id} style="border-bottom:1px solid rgba(41,37,36,.5)">
                    <td style="padding:6px 8px;color:#fff;font-weight:600;white-space:nowrap">vs ${g.opponent}</td>
                    <td style=${{padding:"6px 8px",textAlign:"right",fontWeight:"700",fontSize:"12px",color:won?"#4ade80":"#f87171",whiteSpace:"nowrap"}}>${ts.points}–${os.goals*6+os.behinds}</td>
                    ${allStats.map(s=>html`<td key=${s} style="padding:6px 8px;text-align:right;color:#60a5fa;font-weight:700;font-variant-numeric:tabular-nums">${getTotal(s,g.id,"team")}</td>`)}
                  </tr>`;
                })}
                <tr style="background:rgba(41,37,36,.5)">
                  <td style="padding:6px 8px;color:#d6d3d1;font-weight:700;font-size:11px">AVG</td>
                  <td style="padding:6px 8px"/>
                  ${allStats.map(s=>{
                    const avg=sorted.reduce((sum,g)=>sum+getTotal(s,g.id,"team"),0)/sorted.length;
                    return html`<td key=${s} style="padding:6px 8px;text-align:right;color:#d6d3d1;font-weight:700;font-variant-numeric:tabular-nums">${avg.toFixed(1)}</td>`;
                  })}
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        ${topKickers.length>0?html`
          <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524;margin-bottom:12px">
            <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:12px;display:flex;align-items:center;gap:8px"><${AflBall} size=${16}/> GOAL KICKERS — SEASON</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${topKickers.map(([pid,goals],idx)=>html`
                <div key=${pid} style="display:flex;align-items:center;gap:12px">
                  <div style="font-size:12px;font-weight:900;color:#78716c;width:20px;text-align:center">${idx+1}</div>
                  <div style="flex:1;font-size:13px;color:#fff;font-weight:600">${pName(pid)}</div>
                  <div style="display:flex;align-items:center;gap:6px">
                    <div style=${{height:"8px",borderRadius:"4px",background:"#facc15",width:`${Math.max(8,(goals/topKickers[0][1])*120)}px`}}/>
                    <span style="color:#facc15;font-weight:900;font-size:18px;width:32px;text-align:right;font-variant-numeric:tabular-nums">${goals}</span>
                  </div>
                </div>`)}
            </div>
          </div>`:null}

        <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:8px;display:flex;align-items:center;gap:8px">
            <span>⇄ US − THEM (DIFFERENTIAL BY GAME)</span>
          </div>
          <div style="font-size:10px;color:#78716c;margin-bottom:10px;font-style:italic">
            Positive (green) = ${teamName} ahead. Negative (red) = opponent ahead. Only games with away-stats recorded show non-zero differentials.
          </div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="border-bottom:1px solid #292524">
                <th style="text-align:left;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap;position:sticky;left:0;background:#1c1917">GAME</th>
                ${allStats.map(s => html`<th key=${s} style="text-align:right;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">${s}</th>`)}
              </tr></thead>
              <tbody>
                ${sorted.map(g => {
                  const oppQ = g.stats.opp || {};
                  const oppTotal = (stat) => {
                    let t = 0;
                    QUARTERS.forEach(qq => { t += (oppQ[qq] && oppQ[qq][stat]) || 0; });
                    return t;
                  };
                  return html`
                    <tr key=${g.id} style="border-bottom:1px solid rgba(41,37,36,.5)">
                      <td style="padding:6px 8px;color:#fff;font-weight:600;white-space:nowrap;position:sticky;left:0;background:#1c1917">vs ${g.opponent}</td>
                      ${allStats.map(s => {
                        const ours = getTotal(s, g.id, "team");
                        const theirs = oppTotal(s);
                        const diff = ours - theirs;
                        const color = diff > 0 ? "#4ade80" : diff < 0 ? "#f87171" : "#57534e";
                        const label = diff === 0 ? (theirs===0 && ours===0 ? "—" : "0") : (diff > 0 ? `+${diff}` : `${diff}`);
                        return html`<td key=${s} style=${{padding:"6px 8px",textAlign:"right",color,fontWeight:"700",fontVariantNumeric:"tabular-nums"}}>${label}</td>`;
                      })}
                    </tr>`;
                })}
                <tr style="background:rgba(41,37,36,.5)">
                  <td style="padding:6px 8px;color:#d6d3d1;font-weight:700;font-size:11px;position:sticky;left:0;background:#2a2826">AVG</td>
                  ${allStats.map(s => {
                    let totalDiff = 0;
                    sorted.forEach(g => {
                      const ours = getTotal(s, g.id, "team");
                      const oppQ = g.stats.opp || {};
                      let theirs = 0;
                      QUARTERS.forEach(qq => { theirs += (oppQ[qq] && oppQ[qq][s]) || 0; });
                      totalDiff += ours - theirs;
                    });
                    const avg = totalDiff / sorted.length;
                    const color = avg > 0.05 ? "#4ade80" : avg < -0.05 ? "#f87171" : "#a8a29e";
                    const label = avg.toFixed(1);
                    return html`<td key=${s} style=${{padding:"6px 8px",textAlign:"right",color,fontWeight:"700",fontVariantNumeric:"tabular-nums"}}>${avg > 0 ? "+" + label : label}</td>`;
                  })}
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>`;

    // ---- PLAYER sub-view: per-player totals across all games, with a
    // dropdown to drill into a single player. When a player is selected, we
    // show their season totals (one card), a per-game goals + behinds bar
    // breakdown, and a per-game stats table (mirroring TEAM TOTALS BY GAME). ----
    const playersWithStats = new Set();
    sorted.forEach(g => Object.keys(g.stats.players||{}).forEach(pid => playersWithStats.add(pid)));
    const dropdownPlayers = [
      ...[...roster].sort((a,b) => (parseInt(a.number,10)||999) - (parseInt(b.number,10)||999) || a.name.localeCompare(b.name))
    ];
    const rosterIds = new Set(roster.map(p=>p.id));
    Array.from(playersWithStats).forEach(pid => {
      if (pid === UNK) return;
      if (!rosterIds.has(pid)) dropdownPlayers.push({id:pid, name:"(removed player)", number:""});
    });
    const unkHasStats = sorted.some(g => {
      const u = g.stats.players && g.stats.players[UNK];
      if (!u) return false;
      return QUARTERS.some(q => u[q] && Object.values(u[q]).some(v => v>0));
    });
    if (unkHasStats) dropdownPlayers.push({id:UNK, name:"Unattributed", number:""});

    let drillSection = null;
    if (comparePid) {
      const player = dropdownPlayers.find(p => p.id === comparePid)
                  || roster.find(p => p.id === comparePid)
                  || {id:comparePid, name:"Unknown", number:""};
      const seasonTotals = {};
      allStats.forEach(s => { seasonTotals[s] = sorted.reduce((sum,g) => sum + getTotal(s, g.id, "player", comparePid), 0); });
      const totalGoals = seasonTotals["Goals"] || 0;
      const totalBehinds = seasonTotals["Behinds"] || 0;
      const perGame = sorted.map(g => ({
        g, goals: getTotal("Goals", g.id, "player", comparePid),
        behinds: getTotal("Behinds", g.id, "player", comparePid)
      }));
      const maxGoals = Math.max(1, ...perGame.map(x => x.goals));
      const gamesWithGoals = perGame.filter(x => x.goals > 0).length;
      const avgGoals = sorted.length ? (totalGoals / sorted.length) : 0;
      const accuracy = (totalGoals + totalBehinds) > 0
        ? Math.round((totalGoals / (totalGoals + totalBehinds)) * 100)
        : null;
      // Key stats shown in PLAYER TOTALS BY GAME — mirrors the TEAM TOTALS BY
      // GAME layout. We pick the six most coaching-relevant defaults rather
      // than every stat (so the table fits on an iPad without horizontal scroll).
      const KEY_STATS = ["Goals","Behinds","Kicks","Handballs","Marks","Tackles"];
      const playerKeyStats = KEY_STATS.filter(s => allStats.includes(s));

      drillSection = html`
        <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524;margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
            <${AflBall} size=${18}/>
            <div style="font-size:14px;font-weight:900;color:#fff">
              ${player.number?html`<span style="color:#60a5fa">#${player.number} </span>`:null}${player.name}
            </div>
            <div style="font-size:10px;color:#78716c;letter-spacing:.08em;font-weight:700">SEASON</div>
          </div>

          <!-- Headline scoring stats -->
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px">
            <div style="background:#0c0a09;border-radius:8px;padding:10px;border:1px solid #292524">
              <div style="font-size:10px;color:#78716c;letter-spacing:.08em;font-weight:700">GOALS</div>
              <div style="font-size:22px;color:#facc15;font-weight:900;font-variant-numeric:tabular-nums">${totalGoals}</div>
              <div style="font-size:10px;color:#a8a29e">${avgGoals.toFixed(1)} per game</div>
            </div>
            <div style="background:#0c0a09;border-radius:8px;padding:10px;border:1px solid #292524">
              <div style="font-size:10px;color:#78716c;letter-spacing:.08em;font-weight:700">BEHINDS</div>
              <div style="font-size:22px;color:#fb923c;font-weight:900;font-variant-numeric:tabular-nums">${totalBehinds}</div>
              <div style="font-size:10px;color:#a8a29e">${gamesWithGoals} of ${sorted.length} games scored</div>
            </div>
            <div style="background:#0c0a09;border-radius:8px;padding:10px;border:1px solid #292524">
              <div style="font-size:10px;color:#78716c;letter-spacing:.08em;font-weight:700">ACCURACY</div>
              <div style="font-size:22px;color:${accuracy==null?"#57534e":accuracy>=50?"#4ade80":"#f87171"};font-weight:900;font-variant-numeric:tabular-nums">
                ${accuracy==null?"—":`${accuracy}%`}
              </div>
              <div style="font-size:10px;color:#a8a29e">goals ÷ shots</div>
            </div>
          </div>

          <!-- Per-game goals breakdown — bars sized to max goals in any one game -->
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:8px">GOALS BY GAME</div>
          ${perGame.length === 0 ? html`<div style="font-size:12px;color:#78716c">No games yet.</div>` :
            html`<div style="display:flex;flex-direction:column;gap:6px">
              ${perGame.map(({g, goals, behinds}) => {
                const barW = Math.max(0, (goals / maxGoals) * 100);
                return html`<div key=${g.id} style="display:flex;align-items:center;gap:10px">
                  <div style="font-size:11px;color:#d6d3d1;width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">vs ${g.opponent}</div>
                  <div style="flex:1;background:#0c0a09;border-radius:4px;height:14px;position:relative;overflow:hidden">
                    <div style=${{position:"absolute",top:"0",left:"0",height:"100%",width:`${barW}%`,background:goals>0?"#facc15":"transparent",borderRadius:"4px",transition:"width .2s"}}/>
                  </div>
                  <div style="font-size:12px;font-weight:900;color:#facc15;width:24px;text-align:right;font-variant-numeric:tabular-nums">${goals}</div>
                  <div style="font-size:10px;color:#fb923c;width:34px;text-align:right;font-variant-numeric:tabular-nums">${behinds?`+${behinds}b`:""}</div>
                </div>`;
              })}
            </div>`}
        </div>

        <!-- Full season-stats row for the player (all stats, not just goals).
             Hidden in PRESENT mode — too many small numbers to project. -->
        ${presentMode ? null : html`
        <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:12px">ALL SEASON STATS</div>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="border-bottom:1px solid #292524">
                ${allStats.map(s=>html`<th key=${s} style="text-align:right;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">${s}</th>`)}
              </tr></thead>
              <tbody>
                <tr>
                  ${allStats.map(s=>html`<td key=${s} style="padding:6px 8px;text-align:right;color:#60a5fa;font-weight:700;font-variant-numeric:tabular-nums">${seasonTotals[s]||"—"}</td>`)}
                </tr>
              </tbody>
            </table>
          </div>
        </div>`}

        <!-- PLAYER TOTALS BY GAME — mirrors the TEAM TOTALS BY GAME card.
             Shows the six most coaching-relevant stats per game with an AVG row.
             Hidden in PRESENT mode (too dense for a TV view). -->
        ${presentMode ? null : html`
        <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524">
          <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:12px">PLAYER TOTALS BY GAME</div>
          ${sorted.length === 0 ? html`<div style="font-size:12px;color:#78716c">No games yet.</div>` :
            html`<div style="overflow-x:auto">
              <table style="width:100%;border-collapse:collapse;font-size:13px">
                <thead><tr style="border-bottom:1px solid #292524">
                  <th style="text-align:left;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">GAME</th>
                  ${playerKeyStats.map(s=>html`<th key=${s} style="text-align:right;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">${s}</th>`)}
                </tr></thead>
                <tbody>
                  ${sorted.map(g=>{
                    return html`<tr key=${g.id} style="border-bottom:1px solid rgba(41,37,36,.5)">
                      <td style="padding:6px 8px;color:#fff;font-weight:600;white-space:nowrap">vs ${g.opponent}</td>
                      ${playerKeyStats.map(s=>{
                        const v = getTotal(s, g.id, "player", comparePid);
                        return html`<td key=${s} style="padding:6px 8px;text-align:right;color:#60a5fa;font-weight:700;font-variant-numeric:tabular-nums">${v||"—"}</td>`;
                      })}
                    </tr>`;
                  })}
                  <tr style="background:rgba(41,37,36,.5)">
                    <td style="padding:6px 8px;color:#d6d3d1;font-weight:700;font-size:11px">AVG</td>
                    ${playerKeyStats.map(s=>{
                      const total = sorted.reduce((sum,g)=>sum+getTotal(s, g.id, "player", comparePid), 0);
                      const avg = sorted.length ? total / sorted.length : 0;
                      return html`<td key=${s} style="padding:6px 8px;text-align:right;color:#d6d3d1;font-weight:700;font-variant-numeric:tabular-nums">${avg.toFixed(1)}</td>`;
                    })}
                  </tr>
                </tbody>
              </table>
            </div>`}
        </div>`}`;
    }

    // The all-players totals table (default view when no player is selected).
    // In presentMode we collapse into a leaderboard-style display: just goals
    // bars, no per-stat columns, so it reads at a glance from across the room.
    const allPlayersTable = presentMode ? html`
      <div style="background:#1c1917;border-radius:12px;padding:16px;border:1px solid #292524">
        <div style="font-size:14px;font-weight:900;letter-spacing:.1em;color:#a8a29e;margin-bottom:14px">SEASON GOAL KICKERS</div>
        ${(() => {
          const tally = {};
          sorted.forEach(g => Object.keys(g.stats.players||{}).forEach(pid => {
            if (!tally[pid]) tally[pid] = 0;
            QUARTERS.forEach(q => { tally[pid] += (g.stats.players[pid][q] && g.stats.players[pid][q]["Goals"]) || 0; });
          }));
          const ranked = Object.entries(tally).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
          if (!ranked.length) return html`<div style="font-size:14px;color:#78716c">No goals recorded yet.</div>`;
          const top = ranked[0][1];
          return html`<div style="display:flex;flex-direction:column;gap:14px">
            ${ranked.map(([pid,goals],idx) => html`
              <div key=${pid} style="display:flex;align-items:center;gap:14px">
                <div style="font-size:18px;font-weight:900;color:#78716c;width:28px;text-align:center">${idx+1}</div>
                <div style="flex:1;font-size:18px;color:#fff;font-weight:700">${pName(pid)}</div>
                <div style="display:flex;align-items:center;gap:10px">
                  <div style=${{height:"14px",borderRadius:"6px",background:"#facc15",width:`${Math.max(20,(goals/top)*200)}px`}}/>
                  <span style="color:#facc15;font-weight:900;font-size:26px;width:48px;text-align:right;font-variant-numeric:tabular-nums">${goals}</span>
                </div>
              </div>`)}
          </div>`;
        })()}
      </div>` : html`
      <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:12px">PLAYER TOTALS — ALL GAMES</div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="border-bottom:1px solid #292524">
              <th style="text-align:left;padding:6px 8px;color:#a8a29e;font-size:11px">PLAYER</th>
              ${allStats.map(s=>html`<th key=${s} style="text-align:right;padding:6px 8px;color:#a8a29e;font-size:11px;white-space:nowrap">${s}</th>`)}
            </tr></thead>
            <tbody>
              ${[...roster,{id:UNK,name:"Unattributed",number:""}].map(p=>{
                const totals={};
                allStats.forEach(s=>{totals[s]=sorted.reduce((sum,g)=>sum+getTotal(s,g.id,"player",p.id),0);});
                if(!Object.values(totals).some(v=>v>0)) return null;
                return html`<tr key=${p.id} style="border-bottom:1px solid rgba(41,37,36,.5)">
                  <td style="padding:6px 8px;color:#fff;font-weight:600;white-space:nowrap">
                    ${p.id===UNK?html`<span style="color:#78716c;font-style:italic">Unattributed</span>`:
                      html`${p.number?html`<span style="color:#60a5fa">#${p.number} </span>`:null}${p.name}`}
                  </td>
                  ${allStats.map(s=>html`<td key=${s} style="padding:6px 8px;text-align:right;color:#60a5fa;font-weight:700;font-variant-numeric:tabular-nums">${totals[s]||"—"}</td>`)}
                </tr>`;
              })}
            </tbody>
          </table>
        </div>
      </div>`;

    const playerSection = html`
      <div>
        <!-- Player picker — switches between the all-players table and a per-player drill view. -->
        <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <label style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e">PLAYER</label>
          <select value=${comparePid} onChange=${e=>setComparePid(e.target.value)}
            style="flex:1;min-width:160px;background:#0c0a09;color:#fff;border:1px solid #44403c;border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;font-weight:600">
            <option value="">All players (totals table)</option>
            ${dropdownPlayers.map(p => html`
              <option key=${p.id} value=${p.id}>
                ${p.number ? `#${p.number} ${p.name}` : p.name}
              </option>`)}
          </select>
          ${comparePid ? html`
            <button onClick=${()=>setComparePid("")}
              style="background:#292524;color:#d6d3d1;border:1px solid #44403c;border-radius:6px;padding:7px 10px;font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;font-family:inherit">CLEAR</button>` : null}
        </div>
        ${comparePid ? drillSection : allPlayersTable}
      </div>`;

    // ---- RATINGS sub-view: average rating per player + notes ----
    const ratingTotals = {};
    sorted.forEach(g => {
      const r = g.ratings || {};
      Object.keys(r).forEach(pid => {
        const entry = r[pid];
        if (!entry || !entry.rating) return;
        if (!ratingTotals[pid]) ratingTotals[pid] = {sum:0, count:0, notes:[]};
        ratingTotals[pid].sum += entry.rating;
        ratingTotals[pid].count += 1;
        if (entry.notes) {
          ratingTotals[pid].notes.push({
            date: new Date(g.date).toLocaleDateString(),
            opp: g.opponent,
            rating: entry.rating,
            text: entry.notes
          });
        }
      });
    });
    const ratedPlayers = Object.entries(ratingTotals)
      .map(([pid, t]) => {
        const p = roster.find(x => x.id === pid);
        return p ? {p, avg: t.sum/t.count, count: t.count, notes: t.notes} : null;
      })
      .filter(Boolean)
      .sort((a, b) => b.avg - a.avg);
    const ratingsSection = presentMode ? html`
      <div style="background:#1c1917;border-radius:12px;padding:32px;border:1px solid #292524;text-align:center">
        <div style="font-size:36px;margin-bottom:12px">📺</div>
        <div style="color:#fff;font-size:16px;font-weight:700;margin-bottom:6px">Ratings hidden in PRESENT mode</div>
        <div style="color:#78716c;font-size:13px">Individual player ratings and coach's notes are kept private. Tap PRESENT off to view.</div>
      </div>
    ` : ratedPlayers.length === 0 ? html`
      <div style="background:#1c1917;border-radius:12px;padding:24px;border:1px solid #292524;text-align:center">
        <div style="color:#78716c;font-size:13px">No ratings recorded yet.</div>
        <div style="color:#57534e;font-size:11px;margin-top:6px;font-style:italic">Use the RATINGS tab during a game to score players 1–5 stars.</div>
      </div>
    ` : html`
      <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid #292524">
        <div style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#a8a29e;margin-bottom:12px">⭐ AVERAGE PLAYER RATINGS — SEASON</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${ratedPlayers.map(({p, avg, count, notes}) => html`
            <div key=${p.id} style="background:#0c0a09;border-radius:8px;padding:10px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:${notes.length?6:0}">
                <div style="font-size:14px;color:#fff;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                  ${p.number?html`<span style="color:#60a5fa">#${p.number} </span>`:null}${p.name}
                </div>
                <div style="font-size:18px;color:#facc15;letter-spacing:1px;line-height:1">
                  ${[1,2,3,4,5].map(n => {
                    if (avg >= n - 0.25) return "★";
                    if (avg >= n - 0.75) return "⯨";
                    return html`<span style="color:#44403c">★</span>`;
                  })}
                </div>
                <div style="font-size:13px;color:#facc15;font-weight:900;font-variant-numeric:tabular-nums;min-width:32px;text-align:right">${avg.toFixed(1)}</div>
                <div style="font-size:10px;color:#78716c;font-weight:700">×${count}</div>
              </div>
              ${notes.length ? html`
                <details style="margin-top:4px">
                  <summary style="cursor:pointer;font-size:11px;color:#60a5fa;font-weight:700;list-style:none;padding:2px 0">${notes.length} note${notes.length>1?'s':''} ▾</summary>
                  <div style="display:flex;flex-direction:column;gap:6px;margin-top:6px;padding-left:8px;border-left:2px solid #292524">
                    ${notes.map((n,i) => html`
                      <div key=${i} style="font-size:11px;color:#d6d3d1">
                        <div style="color:#78716c;font-weight:700;letter-spacing:.05em">${n.date} vs ${n.opp} · ${"★".repeat(n.rating)}</div>
                        <div style="margin-top:2px;line-height:1.4">${n.text}</div>
                      </div>
                    `)}
                  </div>
                </details>
              ` : null}
            </div>
          `)}
        </div>
      </div>`;

    // ---- HEATMAP SECTION ----
    // Two side-by-side forward-50 maps: GOALS and BEHINDS. Each cell is shaded
    // by how many shots of that type came from that zone, normalised across
    // the 12 zones in that map (so the hottest zone is always full intensity,
    // colder zones taper down). Filter dropdown lets the coach narrow to a
    // single game; default is all games.
    //
    // Source data: every game's `shotHeatmap` array — populated when the
    // coach taps a zone in the modal that pops up after a goal/behind. Older
    // games (pre-feature) just have no entries and don't contribute.
    const heatmapEntries = (() => {
      const rows = [];
      games.forEach(g => {
        if (!Array.isArray(g.shotHeatmap)) return;
        if (heatmapGameFilter && g.id !== heatmapGameFilter) return;
        g.shotHeatmap.forEach(s => rows.push(s));
      });
      return rows;
    })();
    // Build {zoneId: count} for goals and behinds.
    const goalsByZone   = {};
    const behindsByZone = {};
    HEATMAP_ZONES.forEach(z => { goalsByZone[z.id]=0; behindsByZone[z.id]=0; });
    heatmapEntries.forEach(s => {
      const bucket = s.type === "goal" ? goalsByZone : behindsByZone;
      if (bucket[s.zone] !== undefined) bucket[s.zone] = (bucket[s.zone]||0) + 1;
    });
    const goalsTotal   = heatmapEntries.filter(s => s.type==="goal").length;
    const behindsTotal = heatmapEntries.filter(s => s.type==="behind").length;
    const maxGoals   = Math.max(0, ...Object.values(goalsByZone));
    const maxBehinds = Math.max(0, ...Object.values(behindsByZone));
    // Render one F50 SVG with shaded zones. `byZone` maps zone id -> count;
    // `max` is the count of the hottest zone (for normalisation); `total` is
    // the sum across zones (for percentages); `accent` is the base hue
    // (yellow for goals, blue for behinds). Each zone's label shows the
    // percentage of total shots from that zone with the raw count in
    // brackets — e.g. "45% (5)". Empty zones show no label.
    const renderHeatmapSvg = (byZone, max, total, accent) => {
      const M = 3;
      const VB_H = 50;
      // accent rgb extraction: facc15 -> 250,204,21 / 60a5fa -> 96,165,250
      const rgb = accent === "goals" ? "250,204,21" : "96,165,250";
      return html`
        <svg viewBox=${`${-M} ${-5} ${FIELD_W+M*2} ${VB_H+5+M}`}
             preserveAspectRatio="xMidYMid meet"
             style="width:100%;display:block">
          <defs>
            <radialGradient id=${`hmGrad_${accent}`} cx="50%" cy="20%" r="80%">
              <stop offset="0%" stop-color="#4ca860"/>
              <stop offset="60%" stop-color="#357a44"/>
              <stop offset="100%" stop-color="#1f5a2c"/>
            </radialGradient>
            <clipPath id=${`hmOvalClip_${accent}`}>
              <ellipse cx=${CX} cy=${CY} rx=${RX} ry=${RY}/>
            </clipPath>
          </defs>
          <g clip-path=${`url(#hmOvalClip_${accent})`}>
            <rect x=${-M} y=${-5} width=${FIELD_W+M*2} height=${VB_H+10} fill=${`url(#hmGrad_${accent})`}/>
            <circle cx=${CX} cy="0" r=${GOAL_RADIUS} fill="none" stroke="#fff" stroke-width="0.5"/>
            <rect x=${CX-GS_HALF_W} y="0" width=${GS_HALF_W*2} height=${GS_DEPTH} fill="none" stroke="#fff" stroke-width="0.4"/>
            <line x1=${CX-GP_HALF} y1="0" x2=${CX+GP_HALF} y2="0" stroke="#fff" stroke-width="0.6"/>
            <ellipse cx=${CX} cy=${CY} rx=${RX} ry=${RY} fill="none" stroke="#fff" stroke-width="0.5"/>
            ${HEATMAP_ZONES.map(z => {
              const count = byZone[z.id] || 0;
              const intensity = max > 0 ? count / max : 0;     // 0..1
              const opacity = count === 0 ? 0 : 0.18 + 0.62 * intensity;
              const pct = total > 0 ? Math.round((count/total)*100) : 0;
              const ctr = heatmapZoneVisibleCenter(z);
              return html`
                <g key=${z.id}>
                  <rect x=${z.x} y=${z.y} width=${z.w} height=${z.h}
                    fill=${`rgba(${rgb},${opacity})`}
                    stroke=${`rgba(${rgb},0.55)`} stroke-width="0.3" stroke-dasharray="0.6 0.6"/>
                  ${count > 0 ? html`
                    <text x=${ctr.cx} y=${ctr.cy} text-anchor="middle"
                      font-size="3.2" font-weight="900" fill="#fff"
                      style="pointer-events:none;font-family:ui-monospace,monospace">${pct}%</text>
                    <text x=${ctr.cx} y=${ctr.cy+2.7} text-anchor="middle"
                      font-size="2.0" font-weight="700"
                      fill=${`rgba(${rgb},0.95)`}
                      style="pointer-events:none;font-family:ui-monospace,monospace">(${count})</text>
                  ` : null}
                </g>`;
            })}
          </g>
          <line x1=${CX-GP_HALF} y1="0" x2=${CX-GP_HALF} y2="-3" stroke="#fff" stroke-width="0.7" stroke-linecap="round"/>
          <line x1=${CX+GP_HALF} y1="0" x2=${CX+GP_HALF} y2="-3" stroke="#fff" stroke-width="0.7" stroke-linecap="round"/>
          <line x1=${CX-BP_OFFSET} y1="0" x2=${CX-BP_OFFSET} y2="-2" stroke="#fff" stroke-width="0.5" stroke-linecap="round"/>
          <line x1=${CX+BP_OFFSET} y1="0" x2=${CX+BP_OFFSET} y2="-2" stroke="#fff" stroke-width="0.5" stroke-linecap="round"/>
        </svg>`;
    };
    // Quick stats: which zone has the highest count (the "hot" zone) so the
    // coach has a one-line takeaway above each map.
    const hotZone = (byZone, total) => {
      if (total === 0) return null;
      let best = 0, bestId = 0;
      HEATMAP_ZONES.forEach(z => {
        const c = byZone[z.id] || 0;
        if (c > best) { best = c; bestId = z.id; }
      });
      return best > 0 ? { id: bestId, count: best } : null;
    };
    const goalsHot   = hotZone(goalsByZone,   goalsTotal);
    const behindsHot = hotZone(behindsByZone, behindsTotal);
    const heatmapSection = html`
      <div style="display:flex;flex-direction:column;gap:12px">
        <!-- Filter strip — choose all games or one specific game -->
        <div style="background:#1c1917;border-radius:12px;padding:10px 12px;border:1px solid #292524;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:11px;font-weight:900;letter-spacing:.1em;color:#a8a29e">FILTER</span>
          <select value=${heatmapGameFilter} onChange=${e=>setHeatmapGameFilter(e.target.value)}
            style="background:#0c0a09;color:#fff;border:1px solid #44403c;border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;flex:1;min-width:160px">
            <option value="">All games (season)</option>
            ${[...games].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map(g => {
              const d = g.date ? new Date(g.date).toLocaleDateString() : "";
              return html`<option key=${g.id} value=${g.id}>${d} vs ${g.opponent}</option>`;
            })}
          </select>
          <span style="font-size:11px;color:#78716c">${heatmapEntries.length} shot${heatmapEntries.length===1?"":"s"} mapped</span>
        </div>
        ${heatmapEntries.length === 0 ? html`
          <div style="background:#1c1917;border-radius:12px;padding:24px;border:1px solid #292524;text-align:center">
            <div style="color:#78716c;font-size:13px">No locations recorded ${heatmapGameFilter?"for this game":"yet"}.</div>
            <div style="color:#57534e;font-size:11px;margin-top:6px;font-style:italic">After a player kicks a goal or behind, a popup will ask where on the forward 50 the shot came from.</div>
          </div>
        ` : html`
          <!-- Two maps side by side on wide screens, stacked on phones -->
          <div style="display:grid;grid-template-columns:1fr;gap:12px" class="lg-row-grid">
            <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid rgba(250,204,21,.25)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <div style="font-size:11px;font-weight:900;letter-spacing:.1em;color:#facc15;display:flex;align-items:center;gap:6px"><${AflBall} size=${14}/> GOALS BY ZONE</div>
                <div style="font-size:13px;color:#fff;font-weight:900">${goalsTotal}</div>
              </div>
              ${goalsHot ? html`
                <div style="font-size:11px;color:#a8a29e;margin-bottom:6px">Hottest zone: <span style="color:#facc15;font-weight:900">#${goalsHot.id}</span> (${goalsHot.count} goal${goalsHot.count===1?"":"s"})</div>
              ` : html`<div style="font-size:11px;color:#78716c;margin-bottom:6px;font-style:italic">No goals with location yet.</div>`}
              <!-- Colour-intensity legend: brighter yellow = more goals from that zone. -->
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:9px;color:#78716c;font-weight:700;letter-spacing:.05em">
                <span>FEW</span>
                <div style="flex:1;height:7px;border-radius:3px;background:linear-gradient(to right, rgba(250,204,21,0.18), rgba(250,204,21,0.80));border:1px solid rgba(250,204,21,0.4)"></div>
                <span>MANY</span>
              </div>
              ${renderHeatmapSvg(goalsByZone, maxGoals, goalsTotal, "goals")}
            </div>
            <div style="background:#1c1917;border-radius:12px;padding:12px;border:1px solid rgba(96,165,250,.25)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <div style="font-size:11px;font-weight:900;letter-spacing:.1em;color:#60a5fa">● BEHINDS BY ZONE</div>
                <div style="font-size:13px;color:#fff;font-weight:900">${behindsTotal}</div>
              </div>
              ${behindsHot ? html`
                <div style="font-size:11px;color:#a8a29e;margin-bottom:6px">Hottest zone: <span style="color:#60a5fa;font-weight:900">#${behindsHot.id}</span> (${behindsHot.count} behind${behindsHot.count===1?"":"s"})</div>
              ` : html`<div style="font-size:11px;color:#78716c;margin-bottom:6px;font-style:italic">No behinds with location yet.</div>`}
              <!-- Colour-intensity legend: brighter blue = more behinds from that zone. -->
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:9px;color:#78716c;font-weight:700;letter-spacing:.05em">
                <span>FEW</span>
                <div style="flex:1;height:7px;border-radius:3px;background:linear-gradient(to right, rgba(96,165,250,0.18), rgba(96,165,250,0.80));border:1px solid rgba(96,165,250,0.4)"></div>
                <span>MANY</span>
              </div>
              ${renderHeatmapSvg(behindsByZone, maxBehinds, behindsTotal, "behinds")}
            </div>
          </div>
          <div style="font-size:10px;color:#57534e;font-style:italic;text-align:center">Rushed behinds and unattributed shots aren't mapped (no location recorded).</div>
        `}
      </div>`;

    return html`
      <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div style="display:flex;background:#0c0a09;border-bottom:1px solid #292524;align-items:center">
          <div style="display:flex;flex:1">
            ${[
              {id:"team",   label:"TEAM"},
              {id:"player", label:"PLAYER"},
              {id:"heatmap",label:"HEATMAP"},
              {id:"ratings",label:"RATINGS"}
            ].map(t => html`
              <button key=${t.id} onClick=${()=>setCompareSubView(t.id)}
                style=${{padding:"10px 14px",fontSize:"11px",fontWeight:"900",letterSpacing:".1em",background:"none",border:"none",borderBottom:compareSubView===t.id?"2px solid #2563eb":"2px solid transparent",color:compareSubView===t.id?"#60a5fa":"#78716c",cursor:"pointer",fontFamily:"inherit"}}>
                ${t.label}
              </button>
            `)}
          </div>
          <!-- PRESENT toggle — when on, individual numbers in the player views are
               hidden in favour of bars and totals. Lets the coach plug into a TV
               at a team meeting without exposing per-player stats to the room. -->
          <button onClick=${()=>setPresentMode(!presentMode)} aria-pressed=${presentMode}
            title="Show to players (low-density TV mode)"
            style=${{margin:"4px 8px",padding:"6px 10px",fontSize:"10px",fontWeight:"900",letterSpacing:".08em",
                     background:presentMode?"#1e3a8a":"transparent",
                     color:presentMode?"#fff":"#a8a29e",
                     border:`1px solid ${presentMode?"#3b82f6":"#44403c"}`,
                     borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>
            📺 ${presentMode?"PRESENT ON":"PRESENT"}
          </button>
        </div>
        <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px">
          ${compareSubView==="team"    ? teamSection
            :compareSubView==="player"  ? playerSection
            :compareSubView==="heatmap" ? heatmapSection
            :ratingsSection}
        </div>
      </div>`;
  })();

  // ---- MODAL: Goal kicker ----
  // Declared inline (not as a nested component) so the input/button refs survive
  // every Stats re-render. A nested `const X = () => html\`...\`` would be a fresh
  // function reference on each render, causing Preact to unmount/remount the modal
  // and steal keyboard focus from any input inside it.
  const goalModal = !goalPending ? null : (() => {
    const active=roster.filter(p=>!p.status||p.status===STATUS.ACTIVE);
    // Sort the list so players who have already kicked goals THIS game appear at
    // the top, ordered by goals descending. When one player is having a hot
    // quarter, the coach can tap them without scrolling. Everyone else follows
    // in jersey-number order.
    const goalsThisGame = (pid) => {
      if (!cg || !cg.stats.players[pid]) return 0;
      let t = 0;
      QUARTERS.forEach(q => { t += (cg.stats.players[pid][q] && cg.stats.players[pid][q]["Goals"]) || 0; });
      return t;
    };
    const sortedActive = [...active].sort((a, b) => {
      const ga = goalsThisGame(a.id), gb = goalsThisGame(b.id);
      if (ga !== gb) return gb - ga; // scorers first, hottest at top
      // Both have same goal count (often 0) — fall back to jersey number.
      return (parseInt(a.number,10)||999) - (parseInt(b.number,10)||999) || a.name.localeCompare(b.name);
    });
    return html`
      <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.8)">
        <div style="background:#1c1917;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px;border:1px solid rgba(250,204,21,.3)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <h3 style="color:#fff;font-weight:900;font-size:18px;margin:0;display:flex;align-items:center;gap:8px"><${AflBall} size=${20}/> GOAL — Who kicked it?</h3>
            <button onClick=${confirmGoalUnattributed} style="background:none;border:none;cursor:pointer;color:#78716c;display:flex"><${Icon} name="x" size=${22}/></button>
          </div>
          <div style="font-size:12px;color:#a8a29e;margin-bottom:16px">Tap a player. Tap ✕ to skip. <span style="color:#facc15">★</span> = scored already this game.</div>
          <div style="display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch">
            ${sortedActive.map(p=>{
              const tally = goalsThisGame(p.id);
              const isHot = tally > 0;
              return html`
              <button key=${p.id} onClick=${()=>confirmKicker(p.id)}
                style=${{display:"flex",alignItems:"center",gap:"12px",padding:"12px",
                         background:isHot?"#3a2e0a":"#292524",
                         borderRadius:"12px",
                         border:isHot?"1px solid #facc15":"none",
                         cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                <div style=${{width:"40px",height:"40px",borderRadius:"8px",
                              background:isHot?"#facc15":"#1d4ed8",
                              color:isHot?"#1c1917":"#fff",
                              display:"flex",alignItems:"center",justifyContent:"center",
                              fontWeight:"900",fontSize:"14px",flexShrink:"0"}}>
                  ${p.number||p.name.slice(0,1).toUpperCase()}
                </div>
                <div style="flex:1;min-width:0">
                  <div style="color:#fff;font-weight:700;font-size:14px">${p.name}</div>
                  ${p.number?html`<div style="color:#a8a29e;font-size:12px">#${p.number}</div>`:null}
                </div>
                ${isHot?html`<div style="color:#facc15;font-weight:900;font-size:13px;flex-shrink:0;display:flex;align-items:center;gap:4px">${tally} <${AflBall} size=${14}/></div>`:null}
              </button>`;
            })}
            <button onClick=${confirmGoalUnattributed}
              style="padding:12px;background:#292524;border-radius:12px;border:none;cursor:pointer;color:#a8a29e;font-size:13px;font-weight:700;text-align:left;font-family:inherit">
              Unknown / Don't attribute
            </button>
          </div>
        </div>
      </div>`;
  })();

  // ---- MODAL: Behind kicker ----
  // Same shape as the goal modal but with a Rushed option up front. Rushed
  // behinds (defender forced to put it through) are super common in AFL —
  // they go to the team but don't credit any player and don't get a
  // heatmap zone (no deliberate kick to map).
  const behindModal = !behindPending ? null : (() => {
    const active=roster.filter(p=>!p.status||p.status===STATUS.ACTIVE);
    const behindsThisGame = (pid) => {
      if (!cg || !cg.stats.players[pid]) return 0;
      let t = 0;
      QUARTERS.forEach(q => { t += (cg.stats.players[pid][q] && cg.stats.players[pid][q]["Behinds"]) || 0; });
      return t;
    };
    const sortedActive = [...active].sort((a, b) => {
      const ba = behindsThisGame(a.id), bb = behindsThisGame(b.id);
      if (ba !== bb) return bb - ba;
      return (parseInt(a.number,10)||999) - (parseInt(b.number,10)||999) || a.name.localeCompare(b.name);
    });
    return html`
      <div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.8)">
        <div style="background:#1c1917;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px;border:1px solid rgba(96,165,250,.3)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <h3 style="color:#fff;font-weight:900;font-size:18px;margin:0;display:flex;align-items:center;gap:8px"><${AflBall} size=${20}/> BEHIND — Who kicked it?</h3>
            <button onClick=${confirmBehindUnattributed} style="background:none;border:none;cursor:pointer;color:#78716c;display:flex"><${Icon} name="x" size=${22}/></button>
          </div>
          <div style="font-size:12px;color:#a8a29e;margin-bottom:16px">Tap a player, RUSHED, or ✕ to skip. <span style="color:#facc15">★</span> = behind already this game.</div>
          <div style="display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch">
            <button onClick=${confirmBehindRushed}
              style="display:flex;align-items:center;gap:12px;padding:12px;background:#1e3a8a;border-radius:12px;border:1px solid #60a5fa;cursor:pointer;text-align:left;font-family:inherit">
              <div style="width:40px;height:40px;border-radius:8px;background:#60a5fa;color:#0c0a09;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0">↯</div>
              <div style="flex:1;min-width:0">
                <div style="color:#fff;font-weight:900;font-size:14px">RUSHED</div>
                <div style="color:#bfdbfe;font-size:11px">Forced through by defender — no kicker</div>
              </div>
            </button>
            ${sortedActive.map(p=>{
              const tally = behindsThisGame(p.id);
              const isHot = tally > 0;
              return html`
              <button key=${p.id} onClick=${()=>confirmBehindKicker(p.id)}
                style=${{display:"flex",alignItems:"center",gap:"12px",padding:"12px",
                         background:isHot?"#3a2e0a":"#292524",
                         borderRadius:"12px",
                         border:isHot?"1px solid #facc15":"none",
                         cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                <div style=${{width:"40px",height:"40px",borderRadius:"8px",
                              background:isHot?"#facc15":"#1d4ed8",
                              color:isHot?"#1c1917":"#fff",
                              display:"flex",alignItems:"center",justifyContent:"center",
                              fontWeight:"900",fontSize:"14px",flexShrink:"0"}}>
                  ${p.number||p.name.slice(0,1).toUpperCase()}
                </div>
                <div style="flex:1;min-width:0">
                  <div style="color:#fff;font-weight:700;font-size:14px">${p.name}</div>
                  ${p.number?html`<div style="color:#a8a29e;font-size:12px">#${p.number}</div>`:null}
                </div>
                ${isHot?html`<div style="color:#facc15;font-weight:900;font-size:13px;flex-shrink:0">${tally} ●</div>`:null}
              </button>`;
            })}
            <button onClick=${confirmBehindUnattributed}
              style="padding:12px;background:#292524;border-radius:12px;border:none;cursor:pointer;color:#a8a29e;font-size:13px;font-weight:700;text-align:left;font-family:inherit">
              Unknown / Don't attribute
            </button>
          </div>
        </div>
      </div>`;
  })();

  // ---- MODAL: Heatmap zone picker ----
  // After a goal/behind is attributed (and not rushed), this pops up showing
  // the forward 50 split into a 4×3 grid of 12 zones. Coach taps the zone the
  // shot came from. Tap ✕ to skip (no zone recorded for that shot — the stat

    const VB_H = 50; // y from 0 to ~47, plus posts above (y=-3) and a touch of padding
